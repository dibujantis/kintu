<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Marino</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f6f8;--card:#fff;--border:#d1d9e0;--text:#1e2a35;--muted:#6b7f8e;
  --accent:#3d6b8e;--accent-light:#deeaf4;--accent-dark:#2a4f6d;--accent-mid:#5585a8;
  --danger:#e05252;--shadow:0 1px 3px rgba(30,42,53,.07),0 4px 12px rgba(30,42,53,.05);
  --shadow-lg:0 8px 32px rgba(30,42,53,.13);--radius:16px;--radius-sm:10px;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
input,textarea,select,button{font-family:'Montserrat',sans-serif;}
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;min-height:100vh;}

/* CONFETTI */
.confetti-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.confetti-bg canvas{position:absolute;inset:0;width:100%;height:100%;}

/* HEADER */
.app-header{background:linear-gradient(135deg,var(--accent),var(--accent-dark));padding:1.8rem 2rem;display:flex;align-items:center;}
.logo-lockup{display:flex;align-items:center;gap:.85rem;}
.logo-wordmark{display:flex;flex-direction:column;line-height:1.15;}
.lw-name{font-size:1.15rem;font-weight:900;color:#fff;letter-spacing:-.02em;}
.lw-sub{font-size:.72rem;color:rgba(255,255,255,.65);font-weight:500;}

/* SETUP */
#screen-setup{background:transparent;align-items:center;justify-content:center;padding:3rem 1rem 2rem;}
.setup-box{background:#fff;border-radius:22px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);overflow:hidden;}
.setup-steps{padding:1.8rem;}
.step{display:none;animation:fadeUp .3s ease;}
.step.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-dots{display:flex;gap:.4rem;justify-content:center;margin-bottom:1.5rem;}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .25s;}
.si-dot.done{background:var(--accent);}
.step h2{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:.2rem;}
.step>p{font-size:.82rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.65;}
.setup-illo{display:flex;justify-content:center;margin-bottom:1.2rem;}

/* FORM */
.form-field{margin-bottom:.88rem;}
.form-field label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:.68rem .88rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:border-color .18s,box-shadow .18s;background:#fff;font-size:.85rem;color:var(--text);}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,107,142,.14);}
.pin-row{display:flex;gap:.5rem;justify-content:center;margin:1rem 0;}
.pin-box{width:52px;height:52px;border-radius:12px;border:2px solid var(--border);font-size:1.4rem;text-align:center;font-weight:800;outline:none;transition:border-color .18s,box-shadow .18s;background:#fff;}
.pin-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,107,142,.14);}
.color-picker{display:flex;gap:.45rem;flex-wrap:wrap;}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .12s;border:3px solid transparent;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.sel{border-color:var(--text);transform:scale(1.18);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.38rem;padding:.68rem 1.18rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:700;border:none;transition:all .18s ease;cursor:pointer;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);}
.btn-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:#fef2f2;color:var(--danger);border:1.5px solid #fecaca;}
.btn-ghost{background:none;border:none;color:var(--accent);font-size:.82rem;font-weight:700;padding:.3rem 0;text-decoration:underline;text-underline-offset:3px;cursor:pointer;}
.btn-full{width:100%;}
.btn-sm{padding:.38rem .78rem;font-size:.74rem;}

/* LOGIN */
#screen-login{background:transparent;align-items:center;justify-content:center;padding:3rem 1rem 2rem;}
.login-card{background:#fff;border-radius:22px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);overflow:hidden;}
.user-selector{padding:1.2rem 1.4rem 0;}
.user-selector h3{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.62rem;}
.user-list{display:flex;flex-direction:column;gap:.36rem;max-height:240px;overflow-y:auto;}
.user-item{display:flex;align-items:center;gap:.72rem;padding:.66rem .82rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:#fff;}
.user-item:hover,.user-item.selected{border-color:var(--accent);background:var(--accent-light);}
.ui-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0;}
.ui-name{font-size:.85rem;font-weight:700;color:var(--text);}
.ui-role{font-size:.68rem;color:var(--muted);}
.pin-section{padding:1rem 1.4rem 1.4rem;}
.pin-label{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.58rem;text-align:center;}
.pin-dots{display:flex;gap:.5rem;justify-content:center;margin-bottom:.95rem;}
.pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:.38rem;}
.numpad-btn{padding:.8rem;border-radius:var(--radius-sm);background:var(--bg);border:1.5px solid var(--border);font-size:.9rem;font-weight:700;color:var(--text);transition:all .12s;cursor:pointer;}
.numpad-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.numpad-btn.del{color:var(--muted);font-size:.73rem;}
.login-error{text-align:center;color:var(--danger);font-size:.73rem;font-weight:600;padding:.36rem;min-height:1.3rem;}
.forgot-link{text-align:center;padding-bottom:.75rem;}
.recover-box{padding:1.15rem 1.4rem 1.45rem;display:none;}
.recover-box.active{display:block;}
.recover-back{display:flex;align-items:center;gap:.3rem;font-size:.77rem;font-weight:700;color:var(--muted);background:none;border:none;margin-bottom:.95rem;cursor:pointer;}
.recover-sent{background:var(--accent-light);border:1.5px solid #9bbdd6;border-radius:var(--radius-sm);padding:.88rem 1rem;font-size:.8rem;color:var(--accent-dark);line-height:1.65;display:none;margin-top:.82rem;}
.recover-sent.show{display:block;}

/* APP */
#screen-app{background:transparent;}
.topbar{background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.tb-right{display:flex;align-items:center;gap:.5rem;}
.tb-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff;flex-shrink:0;}
.tb-name{font-size:.78rem;font-weight:700;color:var(--text);}
.tb-logout{background:none;border:1.5px solid var(--border);border-radius:8px;padding:.25rem .6rem;font-size:.68rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.tb-logout:hover{background:var(--bg);color:var(--text);}
.drive-pill{display:flex;align-items:center;gap:.3rem;padding:.2rem .62rem;border-radius:50px;font-size:.63rem;font-weight:700;border:1.5px solid var(--border);cursor:pointer;transition:all .18s;white-space:nowrap;}
.drive-pill.disconnected{color:var(--muted);background:#fff;}
.drive-pill.connected{color:#137333;background:#e6f4ea;border-color:#34a853;}
.drive-pill.syncing{color:#1a73e8;background:#e8f0fe;border-color:#4285f4;}
.drive-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.drive-pill.disconnected .drive-dot{background:var(--muted);}
.drive-pill.connected .drive-dot{background:#34a853;}
.drive-pill.syncing .drive-dot{background:#4285f4;animation:blink .8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.notif-bell{width:30px;height:30px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.notif-bell svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.notif-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:1.5px solid #fff;}
.tabs{background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);display:flex;padding:.3rem .8rem;gap:.18rem;overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(8px);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:.42rem .9rem;border-radius:8px;border:none;font-size:.73rem;font-weight:700;color:var(--muted);background:transparent;white-space:nowrap;transition:all .15s;cursor:pointer;}
.tab.active{background:var(--accent-light);color:var(--accent);}
.tab-content{display:none;padding:1.35rem;max-width:860px;margin:0 auto;width:100%;}
.tab-content.active{display:block;}
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.05rem;gap:.8rem;}
.sec-title{font-size:.98rem;font-weight:800;color:var(--text);}
.sec-sub{font-size:.73rem;color:var(--muted);margin-top:.1rem;}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:.9rem;}
.card-head{padding:.75rem 1.05rem;border-bottom:1px solid var(--border);background:var(--bg);font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.card-body{padding:.9rem 1.05rem;}

/* Banner */
.capsule-banner{background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:var(--radius);padding:1.3rem;margin-bottom:1.05rem;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.cb-left h2{font-size:.98rem;font-weight:800;margin-bottom:.18rem;}
.cb-left p{font-size:.75rem;opacity:.78;}
.cb-right{text-align:right;}
.cb-countdown{font-size:1.8rem;font-weight:900;line-height:1;letter-spacing:-.03em;}
.cb-label{font-size:.65rem;opacity:.72;margin-top:.15rem;}

/* Progress */
.progress-wrap{margin-bottom:1.05rem;}
.progress-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:.38rem;}
.progress-track{height:8px;background:var(--border);border-radius:50px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-mid),var(--accent-dark));border-radius:50px;transition:width .6s ease;}

/* Stats */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:.48rem;margin-bottom:1.05rem;}
.stat-box{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);padding:.7rem .8rem;text-align:center;}
.stat-n{font-size:1.4rem;font-weight:900;color:var(--text);line-height:1;letter-spacing:-.03em;}
.stat-l{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.17rem;font-weight:700;}

/* Filters */
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.95rem;gap:.5rem;flex-wrap:wrap;}
.filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;}
.f-chip{padding:.32rem .72rem;border-radius:50px;border:1.5px solid var(--border);background:#fff;font-size:.7rem;font-weight:700;color:var(--muted);transition:all .15s;cursor:pointer;}
.f-chip:hover,.f-chip.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.view-toggle{display:flex;gap:.22rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.2rem;}
.vt-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted);}
.vt-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.vt-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Memory */
.memory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.8rem;}
.mem-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;}
.mem-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.mem-thumb{height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.mem-thumb img,.mem-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.mem-thumb-play{position:absolute;inset:0;background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;}
.mem-thumb-play svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.mem-type-icon{width:44px;height:44px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.mem-type-icon svg{width:22px;height:22px;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.mem-badge{position:absolute;top:.48rem;right:.48rem;background:rgba(255,255,255,.92);border-radius:6px;padding:.11rem .44rem;font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border:1px solid rgba(0,0,0,.06);}
.mem-author-av{position:absolute;top:.48rem;left:.48rem;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.44rem;font-weight:800;color:#fff;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.mem-age-tag{position:absolute;bottom:.48rem;right:.48rem;background:rgba(0,0,0,.5);color:#fff;border-radius:50px;padding:.1rem .5rem;font-size:.56rem;font-weight:700;}
.mem-body{padding:.66rem .8rem;}
.mem-date{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.16rem;font-weight:600;}
.mem-title{font-size:.86rem;font-weight:700;color:var(--text);margin-bottom:.15rem;line-height:1.3;}
.mem-preview{font-size:.71rem;color:var(--muted);line-height:1.5;}
.mem-milestone-badge{display:inline-flex;align-items:center;gap:.25rem;background:var(--accent-light);color:var(--accent);font-size:.58rem;font-weight:800;padding:.12rem .45rem;border-radius:5px;margin-bottom:.18rem;}

/* Empty state */
.empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:3rem 1.5rem;text-align:center;}
.empty-state svg.illo{width:150px;height:130px;margin-bottom:1.2rem;}
.empty-state h3{font-size:.98rem;font-weight:800;color:var(--text);margin-bottom:.35rem;}
.empty-state p{font-size:.8rem;color:var(--muted);line-height:1.65;max-width:280px;}
.empty-state .empty-cta{margin-top:1.1rem;}

/* Reminder banner — verde agua */
.reminder-banner{background:linear-gradient(135deg,#e8f8f3,#f0faf6);border:1px solid #6ecfae;border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;}
.rb-icon{width:36px;height:36px;background:#c5edd9;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;}
.rb-text{flex:1;}
.rb-title{font-size:.8rem;font-weight:800;color:#0d6e4a;}
.rb-sub{font-size:.7rem;color:#1a8c60;margin-top:.06rem;}
.rb-close{background:none;border:none;color:#1a8c60;cursor:pointer;font-size:.9rem;flex-shrink:0;line-height:1;}

/* Timeline */
.timeline{position:relative;padding-left:2.2rem;}
.timeline::before{content:'';position:absolute;left:.85rem;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent) 0%,var(--border) 100%);}
.tl-year{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;margin-top:1.4rem;position:relative;}
.tl-year::before{content:'';position:absolute;left:-1.75rem;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 0 2px var(--accent);}
.tl-item{display:flex;gap:.8rem;margin-bottom:.75rem;position:relative;cursor:pointer;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border);border:2px solid #fff;flex-shrink:0;margin-top:.55rem;position:absolute;left:-1.58rem;}
.tl-item.milestone .tl-dot{background:var(--accent);}
.tl-card{flex:1;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);padding:.72rem .85rem;transition:box-shadow .15s;}
.tl-card:hover{box-shadow:var(--shadow);}
.tl-card.milestone{border-color:#9bbdd6;background:#f7fbff;}
.tl-meta{display:flex;align-items:center;gap:.4rem;margin-bottom:.22rem;flex-wrap:wrap;}
.tl-type{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.tl-age{font-size:.58rem;font-weight:700;color:var(--accent);background:var(--accent-light);padding:.06rem .38rem;border-radius:50px;}
.tl-title{font-size:.86rem;font-weight:700;color:var(--text);line-height:1.3;}
.tl-preview{font-size:.7rem;color:var(--muted);margin-top:.12rem;line-height:1.5;}
.tl-author{font-size:.6rem;color:var(--muted);margin-top:.28rem;display:flex;align-items:center;gap:.25rem;}

/* Add memory */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.42rem;margin-bottom:1.2rem;}
.type-opt{padding:.7rem .32rem;border-radius:10px;border:1.5px solid var(--border);background:#fff;display:flex;flex-direction:column;align-items:center;gap:.28rem;font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;transition:all .15s;cursor:pointer;}
.type-opt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.type-opt:hover,.type-opt.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:1.35rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-light);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uz-icon{width:40px;height:40px;background:#fff;border-radius:11px;margin:0 auto .6rem;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow);}
.uz-icon svg{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.uz-label{font-size:.78rem;font-weight:600;color:var(--muted);line-height:1.6;}
.uz-label strong{color:var(--accent);}
.uz-sub{font-size:.65rem;color:var(--muted);margin-top:.22rem;opacity:.75;}
.file-preview{display:flex;align-items:center;gap:.72rem;padding:.72rem .88rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:.65rem;}
.fp-thumb{width:44px;height:44px;border-radius:8px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.fp-thumb img,.fp-thumb video{width:100%;height:100%;object-fit:cover;}
.fp-info{flex:1;min-width:0;}
.fp-name{font-size:.76rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fp-size{font-size:.65rem;color:var(--muted);}
.fp-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;flex-shrink:0;}
.fp-remove:hover{color:var(--danger);}

/* Users */
.user-admin-item{display:flex;align-items:center;justify-content:space-between;padding:.76rem .9rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;gap:.75rem;}
.uai-left{display:flex;align-items:center;gap:.66rem;}
.uai-name{font-size:.86rem;font-weight:700;color:var(--text);}
.uai-meta{font-size:.66rem;color:var(--muted);margin-top:.1rem;display:flex;align-items:center;gap:.36rem;flex-wrap:wrap;}
.role-badge{display:inline-block;padding:.1rem .44rem;border-radius:5px;font-size:.57rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.role-badge.admin{background:var(--accent-light);color:var(--accent-dark);}
.role-badge.member{background:#f1f5f9;color:var(--muted);}
.uai-actions{display:flex;gap:.36rem;flex-shrink:0;}
.access-box{background:#f4f8fc;border:1.5px dashed #9bbdd6;border-radius:var(--radius-sm);padding:.9rem;margin-top:.72rem;}
.access-box .ab-label{font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-dark);margin-bottom:.48rem;}
.access-code{font-family:'Courier New',monospace;font-size:1.3rem;font-weight:700;color:var(--text);letter-spacing:.2em;text-align:center;background:#fff;border-radius:8px;padding:.5rem;border:1px solid var(--border);margin-bottom:.48rem;}
.copy-btn{display:inline-flex;align-items:center;gap:.28rem;padding:.34rem .72rem;border-radius:7px;background:var(--accent-light);color:var(--accent);font-size:.7rem;font-weight:700;border:none;transition:all .15s;cursor:pointer;}
.copy-btn:hover{background:var(--accent);color:#fff;}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.78rem 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.sr-name{font-size:.84rem;font-weight:600;color:var(--text);}
.sr-desc{font-size:.67rem;color:var(--muted);margin-top:.1rem;}

/* Lang select */
.lang-select-wrap{position:relative;}
.lang-select{width:100%;padding:.7rem 2.4rem .7rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);outline:none;font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:600;color:var(--text);background:#fff;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .18s,box-shadow .18s;}
.lang-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,107,142,.14);}
.lang-select-arrow{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
.lang-select-arrow svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Toggle */
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:50px;transition:.25s;}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle-switch input:checked + .toggle-slider{background:var(--accent);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(18px);}

/* Drive */
.drive-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.9rem;}
.drive-panel-head{padding:.75rem 1.05rem;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drive-panel-title{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.drive-status-badge{display:flex;align-items:center;gap:.3rem;font-size:.67rem;font-weight:700;padding:.18rem .6rem;border-radius:50px;border:1.5px solid var(--border);}
.drive-status-badge.connected{color:#137333;background:#e6f4ea;border-color:#34a853;}
.drive-status-badge.disconnected{color:var(--muted);background:#f5f5f5;}
.drive-status-badge.syncing{color:#1a73e8;background:#e8f0fe;border-color:#4285f4;}
.drive-dot-badge{width:6px;height:6px;border-radius:50%;}
.drive-status-badge.connected .drive-dot-badge{background:#34a853;}
.drive-status-badge.disconnected .drive-dot-badge{background:var(--muted);}
.drive-status-badge.syncing .drive-dot-badge{background:#4285f4;animation:blink .8s ease-in-out infinite;}
.drive-panel-body{padding:.9rem 1.05rem;}
.drive-info-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.8rem;}
.drive-info-row:last-child{border-bottom:none;}
.dir-label{color:var(--muted);font-size:.76rem;}
.dir-value{font-weight:700;color:var(--text);font-size:.8rem;}
.drive-note{background:#f0f8ff;border:1px solid #b3d4ea;border-radius:var(--radius-sm);padding:.75rem .9rem;font-size:.73rem;color:var(--accent-dark);line-height:1.65;margin-top:.8rem;}

/* Opening */
#screen-opening{background:linear-gradient(160deg,#0d1b2a 0%,#1a3a5c 50%,#0d1b2a 100%);align-items:center;justify-content:center;padding:2rem 1rem;}
.opening-wrap{text-align:center;max-width:380px;width:100%;}
.opening-title{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:.5rem;line-height:1.2;}
.opening-sub{color:rgba(255,255,255,.65);font-size:.88rem;line-height:1.7;margin-bottom:2rem;}
.opening-btn{background:#fff;color:var(--accent-dark);border:none;border-radius:50px;padding:1rem 2.5rem;font-size:1rem;font-weight:800;cursor:pointer;transition:all .22s;box-shadow:0 4px 24px rgba(61,107,142,.4);}
.opening-btn:hover{transform:translateY(-2px);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:22px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:pop .22s ease;}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.modal-head h3{font-size:.93rem;font-weight:800;color:var(--text);}
.modal-head p{font-size:.7rem;color:var(--muted);margin-top:.1rem;}
.mh-close{background:none;border:none;color:var(--muted);font-size:.93rem;line-height:1;cursor:pointer;}
.modal-body{padding:1rem 1.2rem;}
.modal-foot{padding:.8rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:.42rem;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:.52rem 1.15rem;border-radius:50px;font-size:.76rem;font-weight:700;z-index:2000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 20px rgba(0,0,0,.18);white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@media(max-width:600px){
  .type-grid{grid-template-columns:repeat(2,1fr);}
  .stats-strip{grid-template-columns:repeat(2,1fr);}
  .memory-grid{grid-template-columns:1fr 1fr;}
  .topbar{padding:.65rem 1rem;}
  .tab-content{padding:.95rem;}
  .tb-name{display:none;}
  .app-header{padding:1.5rem 1.2rem;}
}
</style>
</head>
<body>
<div class="confetti-bg"><canvas id="confetti-canvas"></canvas></div>

<!-- OPENING -->
<div id="screen-opening" class="screen">
  <div class="opening-wrap">
    <div id="opening-stars" style="margin-bottom:1.5rem"></div>
    <div style="font-size:4.5rem;margin-bottom:1rem;display:inline-block;animation:float 3s ease-in-out infinite">💌</div>
    <div class="opening-title" id="opening-title"></div>
    <div class="opening-sub" id="opening-sub"></div>
    <button class="opening-btn" onclick="openCapsuleReveal()">Abrir mi cápsula</button>
  </div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="setup-box">
    <div class="app-header" id="setup-header"></div>
    <div class="setup-steps">
      <div class="step-dots" id="setup-dots"></div>
      <div class="step active" id="step-1">
        <div class="setup-illo">
          <svg width="110" height="90" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="22" width="94" height="58" rx="10" fill="#e8ecef" stroke="#b0bec5" stroke-width="2"/>
            <path d="M8 32 L55 58 L102 32" stroke="#b0bec5" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M55 40 C55 40 44 30 44 24 C44 19 48 16 52 17 C53.5 17.5 55 19 55 19 C55 19 56.5 17.5 58 17 C62 16 66 19 66 24 C66 30 55 40 55 40Z" fill="#6b7f8e" opacity=".75"/>
            <circle cx="82" cy="16" r="8" fill="#eceff1"/>
            <text x="82" y="20" text-anchor="middle" font-size="10" font-family="Montserrat" font-weight="900" fill="#546473">?</text>
          </svg>
        </div>
        <h2 data-i18n="s1_title"></h2><p data-i18n="s1_desc"></p>
        <div class="form-field"><label data-i18n="s1_name"></label><input type="text" id="s-child-name" data-i18n-ph="s1_name_ph"></div>
        <div class="form-field"><label data-i18n="s1_birth"></label><input type="date" id="s-birth"></div>
        <div class="form-field"><label data-i18n="s1_age"></label>
          <select id="s-open-age"><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18" selected>18</option><option value="21">21</option><option value="25">25</option></select>
        </div>
        <button class="btn btn-primary btn-full" onclick="setupNext(1)" data-i18n="btn_next"></button>
      </div>
      <div class="step" id="step-2">
        <div class="setup-illo">
          <svg width="110" height="90" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="55" cy="30" r="22" fill="#e8ecef" stroke="#b0bec5" stroke-width="2"/>
            <circle cx="55" cy="24" r="10" fill="#b0bec5"/>
            <path d="M35 62 C35 52 42 46 55 46 C68 46 75 52 75 62" fill="#b0bec5"/>
            <circle cx="82" cy="68" r="12" fill="#eceff1" stroke="#b0bec5" stroke-width="2"/>
            <path d="M82 62 L82 68 M79 65 L85 65" stroke="#546473" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M82 68 L82 76" stroke="#546473" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 data-i18n="s2_title"></h2><p data-i18n="s2_desc"></p>
        <div class="form-field"><label data-i18n="s2_name"></label><input type="text" id="s-admin-name" data-i18n-ph="s2_name_ph"></div>
        <div class="form-field"><label data-i18n="field_email"></label><input type="email" id="s-admin-email" placeholder="tu@email.com"></div>
        <div class="form-field"><label data-i18n="field_color"></label><div class="color-picker" id="s-color-picker"></div></div>
        <button class="btn btn-primary btn-full" onclick="setupNext(2)" data-i18n="btn_next"></button>
        <button class="btn btn-secondary btn-full" style="margin-top:.5rem" onclick="setupPrev(2)" data-i18n="btn_back"></button>
      </div>
      <div class="step" id="step-3">
        <div class="setup-illo">
          <svg width="110" height="90" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="30" width="70" height="48" rx="24" fill="#e8ecef" stroke="#b0bec5" stroke-width="2"/>
            <rect x="38" y="18" width="34" height="24" rx="8" fill="none" stroke="#b0bec5" stroke-width="2.5"/>
            <rect x="32" y="36" width="46" height="30" rx="8" fill="#b0bec5"/>
            <rect x="46" y="46" width="18" height="14" rx="4" fill="#fff" opacity=".5"/>
            <circle cx="55" cy="51" r="3" fill="#546473"/>
            <path d="M55 51 L55 56" stroke="#546473" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 data-i18n="s3_title"></h2><p data-i18n="s3_desc"></p>
        <div class="pin-row">
          <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="sp0" oninput="pinMove(this,null,'sp1')">
          <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="sp1" oninput="pinMove(this,'sp0','sp2')" onkeydown="pinBack(event,'sp0')">
          <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="sp2" oninput="pinMove(this,'sp1','sp3')" onkeydown="pinBack(event,'sp1')">
          <input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="sp3" oninput="pinMove(this,'sp2',null)" onkeydown="pinBack(event,'sp2')">
        </div>
        <button class="btn btn-primary btn-full" onclick="setupFinish()" data-i18n="s3_create"></button>
        <button class="btn btn-secondary btn-full" style="margin-top:.5rem" onclick="setupPrev(3)" data-i18n="btn_back"></button>
      </div>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-card">
    <div class="app-header" id="login-header" style="padding:1.65rem 2rem;"></div>
    <div class="user-selector" id="login-user-section">
      <h3 data-i18n="login_who"></h3>
      <div class="user-list" id="login-user-list"></div>
    </div>
    <div class="pin-section" id="pin-section" style="display:none">
      <div class="pin-label" id="pin-label"></div>
      <div class="pin-dots" id="pin-dots"></div>
      <div class="numpad" id="numpad"></div>
      <div class="login-error" id="login-error"></div>
      <div class="forgot-link"><button class="btn-ghost" onclick="showRecover()" data-i18n="forgot_pin"></button></div>
    </div>
    <div class="recover-box" id="recover-box">
      <button class="recover-back" onclick="hideRecover()">&#8592; <span data-i18n="recover_back"></span></button>
      <div style="font-size:.9rem;font-weight:800;color:var(--text);margin-bottom:.2rem" data-i18n="recover_title"></div>
      <div style="font-size:.78rem;color:var(--muted);line-height:1.65;margin-bottom:1rem" data-i18n="recover_desc"></div>
      <div class="form-field"><label data-i18n="field_email"></label><input type="email" id="recover-email" placeholder="tu@email.com"></div>
      <button class="btn btn-primary btn-full" onclick="sendRecoverPin()" data-i18n="recover_send"></button>
      <div class="recover-sent" id="recover-sent"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <div class="topbar">
    <div id="app-header-logo"></div>
    <div class="tb-right">
      <div class="notif-bell" id="notif-bell" onclick="toggleNotifPanel()">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <div class="drive-pill disconnected" id="topbar-drive-pill" onclick="goTab('settings',document.querySelectorAll('.tab')[3])">
        <div class="drive-dot"></div><span id="topbar-drive-text"></span>
      </div>
      <div class="tb-avatar" id="tb-avatar"></div>
      <span class="tb-name" id="tb-name"></span>
      <button class="tb-logout" onclick="logout()" data-i18n="btn_logout"></button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goTab('memories',this)" data-i18n="tab_memories"></button>
    <button class="tab" onclick="goTab('timeline',this)" data-i18n="tab_timeline"></button>
    <button class="tab" onclick="goTab('add',this)" data-i18n="tab_add"></button>
    <button class="tab admin-only" onclick="goTab('users',this)" data-i18n="tab_users"></button>
    <button class="tab" onclick="goTab('settings',this)" data-i18n="tab_settings"></button>
  </div>

  <!-- MEMORIES -->
  <div class="tab-content active" id="tab-memories">

        <button class="vt-btn" id="vt-list" onclick="setView('list',this)"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg></button>

    <div id="memory-grid" class="memory-grid"></div>

  <!-- TIMELINE -->

    <div class="timeline" id="timeline-content"></div>
  </div>

  <!-- ADD -->
  <div class="tab-content" id="tab-add">
    <div class="sec-head"><div><div class="sec-title" data-i18n="add_title"></div><div class="sec-sub" data-i18n="add_sub"></div></div></div>

      <div class="form-field"><label data-i18n="add_type"></label>

          <button class="type-opt" data-type="video" onclick="selType(this)"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><span data-i18n="type_video"></span></button>
          <button class="type-opt" data-type="audio" onclick="selType(this)"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg><span data-i18n="type_audio"></span></button>
          <button class="type-opt" data-type="hito" onclick="selType(this)"><svg viewBox="0 0 24 24"><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/></svg><span data-i18n="type_milestone"></span></button>
        </div>
      </div>
      <div class="form-field"><label data-i18n="add_field_title"></label><input type="text" id="add-title" data-i18n-ph="add_title_ph"></div>
      <div class="form-field"><label data-i18n="add_field_date"></label><input type="date" id="add-date"></div>
      <div class="form-field" id="upload-field">
        <label data-i18n="add_file"></label>
        <div class="upload-zone" id="upload-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="file-input" onchange="onFileChange(event)">
          <div class="uz-icon"><svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
          <div class="uz-label"><strong data-i18n="upload_click"></strong> <span data-i18n="upload_or"></span></div>
          <div class="uz-sub" id="uz-sub-text"></div>
        </div>
        <div class="file-preview" id="file-preview" style="display:none">

(function(){
  const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');
  const PAL=['#9bbdd6','#deeaf4','#b3d4ea','#c5dff0','#a8c8e0','#e8f3f9','#5585a8','#f0f7fb','#7fb3ce','#d1e9f5'];
  let dots=[];
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  function init(){dots=[];for(let i=0;i<80;i++)dots.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:2+Math.random()*8,color:PAL[i%PAL.length],sy:.14+Math.random()*.38,sx:(Math.random()-.5)*.14,op:.18+Math.random()*.32,drift:Math.random()*Math.PI*2,ds:.002+Math.random()*.007});}
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);dots.forEach(function(d){d.drift+=d.ds;d.x+=d.sx+Math.sin(d.drift)*.16;d.y+=d.sy;if(d.y>cv.height+12)d.y=-12;if(d.x>cv.width+12)d.x=-12;if(d.x<-12)d.x=cv.width+12;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=d.color;ctx.globalAlpha=d.op;ctx.fill();});ctx.globalAlpha=1;requestAnimationFrame(draw);}
  resize();init();draw();window.addEventListener('resize',function(){resize();init();});
})();

function avHtml(u,s){s=s||36;return '<div class="ui-avatar" style="width:'+s+'px;height:'+s+'px;font-size:'+(s*.27)+'px;background:'+(u.color||COLORS[0])+'">'+ini(u.name)+'</div>';}

function unlockDate(birth,age){try{var d=new Date(birth);d.setFullYear(d.getFullYear()+age);return d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});}catch(e){return '';}}
function countdown(birth,age){try{var u=new Date(birth);u.setFullYear(u.getFullYear()+age);var diff=u-new Date();if(diff<=0)return tc('moment');var days=Math.floor(diff/864e5),y=Math.floor(days/365),m=Math.floor((days%365)/30);if(y>0)return tf('years_months')(y,m);if(m>0)return tf('months_days')(m,days%30);return tf('days')(days);}catch(e){return '—';}}
function maskEmail(e){if(!e)return '—';var parts=e.split('@');return(parts[0]||'').slice(0,2)+'***@'+(parts[1]||'');}
function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
function ageAtDate(birthStr,dateStr){if(!birthStr||!dateStr)return null;try{var birth=new Date(birthStr),date=new Date(dateStr+'T12:00:00');var years=date.getFullYear()-birth.getFullYear(),months=date.getMonth()-birth.getMonth();if(months<0){years--;months+=12;}return{years:Math.max(0,years),months:Math.max(0,months)};}catch(e){return null;}}
function capsuleProgress(){if(!db||!db.capsule||!db.capsule.birth)return 0;try{var birth=new Date(db.capsule.birth),unlock=new Date(birth);unlock.setFullYear(unlock.getFullYear()+db.capsule.openAge);var total=unlock-birth,elapsed=new Date()-birth;return Math.max(0,Math.min(100,Math.round((elapsed/total)*100)));}catch(e){return 0;}}

// ═══ BOOT ═══
window.onload=function(){
  applyI18n();renderLangSelect();
  db=getDB();
  if(!db){show('screen-setup');initSetup();}
  else{
    try{var b=db.capsule.birth,a=db.capsule.openAge;var u=new Date(b);u.setFullYear(u.getFullYear()+a);if(new Date()>=u){show('screen-opening');initOpeningScreen();return;}}catch(e){}
    initDriveFromStorage();show('screen-login');initLogin();
  }
};
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

// ═══ OPENING ═══
function initOpeningScreen(){if(!db)return;var n=db.capsule.childName||'';document.getElementById('opening-title').textContent=tf('opening_title')(n);document.getElementById('opening-sub').textContent=tc('opening_sub');var stars=document.getElementById('opening-stars');stars.innerHTML=Array.from({length:18},function(){var s=8+Math.random()*14;return'<span style="display:inline-block;width:'+s+'px;height:'+s+'px;background:rgba(255,255,255,'+((.2+Math.random()*.5).toFixed(2))+');border-radius:50%;margin:'+(Math.random()*6)+'px"></span>';}).join('');}
function openCapsuleReveal(){show('screen-login');initLogin();}

// ═══ REMINDERS ═══
function checkReminders(){if(!db||!db.capsule)return;var prefs=JSON.parse(localStorage.getItem('kintu_reminder_prefs')||'{"monthly":true,"birthday":true}');var today=new Date();if(prefs.birthday){try{var b=new Date(db.capsule.birth);if(b.getMonth()===today.getMonth()&&b.getDate()===today.getDate()){showReminderBanner(tf('birthday_reminder_title')(db.capsule.childName),tc('birthday_reminder_sub'));return;}}catch(e){}}if(prefs.monthly){var last=localStorage.getItem('kintu_reminder_dismiss');if(last&&(today-new Date(last))<30*864e5)return;var sorted=db.memories.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});var lm=sorted[0];if(!lm||(today-new Date(lm.createdAt))>30*864e5){showReminderBanner(tc('reminder_title'),tc('reminder_sub'));}}}
function showReminderBanner(title,sub){var ban=document.getElementById('reminder-banner');if(!ban)return;document.getElementById('rb-title').textContent=title;document.getElementById('rb-sub').textContent=sub;ban.style.display='flex';var bell=document.getElementById('notif-bell');if(bell&&!bell.querySelector('.notif-badge')){var bd=document.createElement('div');bd.className='notif-badge';bell.appendChild(bd);}}
function dismissReminder(){var ban=document.getElementById('reminder-banner');if(ban)ban.style.display='none';localStorage.setItem('kintu_reminder_dismiss',new Date().toISOString());var bd=document.querySelector('.notif-badge');if(bd)bd.remove();}
function toggleNotifPanel(){var ban=document.getElementById('reminder-banner');if(ban)ban.style.display=ban.style.display==='none'?'flex':'none';}
function saveReminderPrefs(){var prefs={monthly:!!(document.getElementById('toggle-monthly')||{checked:true}).checked,birthday:!!(document.getElementById('toggle-birthday')||{checked:true}).checked};localStorage.setItem('kintu_reminder_prefs',JSON.stringify(prefs));}

// ═══ SETUP ═══
function initSetup(){var dots=document.getElementById('setup-dots');dots.innerHTML=Array.from({length:3},function(_,i){return'<div class="si-dot" id="sdot-'+(i+1)+'"></div>';}).join('');updateSetupDots();buildColorPicker('s-color-picker',COLORS[0]);document.getElementById('setup-header').innerHTML=buildHeaderHTML('',tc('setup_tagline'));applyI18n();}
function updateSetupDots(){for(var i=1;i<=3;i++)document.getElementById('sdot-'+i).classList.toggle('done',i<=setupStep);}
function setupNext(f){if(f===1){if(!document.getElementById('s-child-name').value.trim()||!document.getElementById('s-birth').value){showToast(tc('toast_fill'));return;}}if(f===2){if(!document.getElementById('s-admin-name').value.trim()){showToast(tc('toast_fill'));return;}var e=document.getElementById('s-admin-email').value.trim();if(!e||!e.includes('@')){showToast(tc('toast_invalid_email'));return;}}document.getElementById('step-'+f).classList.remove('active');setupStep=f+1;document.getElementById('step-'+setupStep).classList.add('active');updateSetupDots();}
function setupPrev(f){document.getElementById('step-'+f).classList.remove('active');setupStep=f-1;document.getElementById('step-'+setupStep).classList.add('active');updateSetupDots();}
function setupFinish(){var pin=['sp0','sp1','sp2','sp3'].map(function(id){return document.getElementById(id).value;}).join('');if(pin.length<4){showToast(tc('toast_short_pin'));return;}var childName=document.getElementById('s-child-name').value.trim();db={capsule:{childName:childName,birth:document.getElementById('s-birth').value,openAge:parseInt(document.getElementById('s-open-age').value)},users:[{id:uid(),name:document.getElementById('s-admin-name').value.trim(),email:document.getElementById('s-admin-email').value.trim().toLowerCase(),role:'admin',color:getPickerColor('s-color-picker'),pin:pin,createdAt:new Date().toISOString()}],memories:[]};saveDB();showToast(tc('toast_created'));setTimeout(function(){show('screen-login');initLogin();},700);}
function buildColorPicker(cid,def){document.getElementById(cid).innerHTML=COLORS.map(function(c){return'<div class="color-swatch'+(c===def?' sel':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this)"></div>';}).join('');}
function pickColor(el){el.closest('.color-picker').querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('sel');});el.classList.add('sel');}
function getPickerColor(cid){var s=document.querySelector('#'+cid+' .color-swatch.sel');return s?s.dataset.color:COLORS[0];}
function pinMove(el,p,n){if(el.value&&n)document.getElementById(n).focus();}
function pinBack(e,p){if(e.key==='Backspace'&&!e.target.value&&p)document.getElementById(p).focus();}
function getPin(ids){return ids.map(function(id){return document.getElementById(id).value;}).join('');}

// ═══ LOGIN ═══
function initLogin(){db=getDB();var childName=db&&db.capsule?db.capsule.childName:'';document.getElementById('login-header').innerHTML=buildHeaderHTML(childName,'');renderLoginUsers();loginPinEntry='';loginSelectedUser=null;document.getElementById('pin-section').style.display='none';document.getElementById('login-error').textContent='';document.getElementById('login-user-section').style.display='block';hideRecover();applyI18n();}
function renderLoginUsers(){document.getElementById('login-user-list').innerHTML=db.users.map(function(u){return'<div class="user-item" id="li-'+u.id+'" onclick="selectLoginUser(\''+u.id+'\')">'+(avHtml(u,36))+'<div><div class="ui-name">'+u.name+'</div><div class="ui-role">'+(u.role==='admin'?tc('role_admin'):tc('role_member'))+'</div></div><div style="margin-left:auto;color:var(--muted)">&#8250;</div></div>';}).join('');}
function selectLoginUser(id){loginSelectedUser=db.users.find(function(u){return u.id===id;});if(!loginSelectedUser)return;document.querySelectorAll('.user-item').forEach(function(el){el.classList.remove('selected');});document.getElementById('li-'+id).classList.add('selected');loginPinEntry='';document.getElementById('login-error').textContent='';renderPinDots();document.getElementById('pin-section').style.display='block';document.getElementById('pin-label').textContent=tf('pin_label')(loginSelectedUser.name);renderNumpad();}
function renderPinDots(){document.getElementById('pin-dots').innerHTML=Array.from({length:4},function(_,i){return'<div class="pin-dot'+(i<loginPinEntry.length?' filled':'')+'"></div>';}).join('');}
function renderNumpad(){document.getElementById('numpad').innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'&#9003;'].map(function(d){if(d==='')return'<div></div>';if(d==='&#9003;')return'<button class="numpad-btn del" onclick="numpadDel()">&#9003;</button>';return'<button class="numpad-btn" onclick="numpadPress(\''+d+'\')">'+d+'</button>';}).join('');}
function numpadPress(d){if(loginPinEntry.length>=4)return;loginPinEntry+=d;renderPinDots();if(loginPinEntry.length===4)setTimeout(tryLogin,200);}
function numpadDel(){loginPinEntry=loginPinEntry.slice(0,-1);renderPinDots();document.getElementById('login-error').textContent='';}
function tryLogin(){if(!loginSelectedUser)return;if(loginPinEntry===loginSelectedUser.pin){currentUser=loginSelectedUser;show('screen-app');initApp();}else{document.getElementById('login-error').textContent=tc('wrong_pin');loginPinEntry='';renderPinDots();}}
function logout(){currentUser=null;show('screen-login');initLogin();}
function showRecover(){document.getElementById('pin-section').style.display='none';document.getElementById('login-user-section').style.display='none';document.getElementById('recover-box').classList.add('active');document.getElementById('recover-email').value='';document.getElementById('recover-sent').classList.remove('show');applyI18n();}
function hideRecover(){document.getElementById('recover-box').classList.remove('active');document.getElementById('login-user-section').style.display='block';document.getElementById('pin-section').style.display='none';loginSelectedUser=null;loginPinEntry='';document.querySelectorAll('.user-item').forEach(function(el){el.classList.remove('selected');});}
function sendRecoverPin(){var email=document.getElementById('recover-email').value.trim().toLowerCase();if(!email||!email.includes('@')){showToast(tc('toast_invalid_email'));return;}var user=db.users.find(function(u){return u.email&&u.email.toLowerCase()===email;});var box=document.getElementById('recover-sent');box.classList.add('show');box.innerHTML=user?tf('recover_found')(user.name,user.pin):tc('recover_notfound');}

// ═══ APP ═══
function initApp(){db=getDB();var isAdmin=currentUser.role==='admin';var childName=db.capsule.childName;document.getElementById('app-header-logo').innerHTML=buildTopbarLogo(childName);var av=document.getElementById('tb-avatar');av.style.background=currentUser.color||COLORS[0];av.textContent=ini(currentUser.name);document.getElementById('tb-name').textContent=currentUser.name;document.querySelectorAll('.admin-only').forEach(function(el){el.style.display=isAdmin?'':'none';});document.getElementById('admin-change-capsule').style.display=isAdmin?'flex':'none';applyI18n();renderLangSelect();updateDriveUI();goTab('memories',document.querySelector('.tab'));document.getElementById('add-date').valueAsDate=new Date();var firstType=document.querySelector('.type-opt.active');if(firstType)selType(firstType);checkReminders();}
function goTab(name,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});if(btn)btn.classList.add('active');var tc2=document.getElementById('tab-'+name);if(tc2)tc2.classList.add('active');if(name==='memories'){renderCountdown();renderProgress();renderStats();renderMemories();}if(name==='timeline')renderTimeline();if(name==='users'&&currentUser&&currentUser.role==='admin')renderUsersAdmin();if(name==='settings')renderSettings();}

function renderCountdown(){if(!db||!db.capsule)return;document.getElementById('cap-name-banner').textContent=db.capsule.childName;document.getElementById('cap-countdown').textContent=countdown(db.capsule.birth,db.capsule.openAge);}
function renderProgress(){var p=capsuleProgress();document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-label-left').textContent=tf('progress_done')(p);var yrsLeft=Math.max(0,db.capsule.openAge-Math.floor((new Date()-new Date(db.capsule.birth))/(365.25*864e5)));document.getElementById('progress-label-right').textContent=yrsLeft>0?yrsLeft+' '+tc('open_in').replace(/\d+/,'').trim():'';}
function renderStats(){if(!db)return;var m=db.memories;document.getElementById('st-total').textContent=m.length;document.getElementById('st-photos').textContent=m.filter(function(x){return x.type==='foto'||x.type==='video';}).length;document.getElementById('st-audio').textContent=m.filter(function(x){return x.type==='audio';}).length;document.getElementById('st-hitos').textContent=m.filter(function(x){return x.type==='hito';}).length;}
function setFilter(btn){document.querySelectorAll('.f-chip').forEach(function(c){c.classList.remove('active');});btn.classList.add('active');selectedFilter=btn.dataset.f;renderMemories();}
function setView(v,btn){currentView=v;document.querySelectorAll('.vt-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderMemories();}

function renderMemories(){var grid=document.getElementById('memory-grid');if(!grid||!db)return;var list=db.memories.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});if(selectedFilter!=='all')list=list.filter(function(m){return m.type===selectedFilter;});if(!list.length){var isF=selectedFilter!=='all';grid.style.gridTemplateColumns='1fr';grid.innerHTML='<div class="empty-state">'+emptyIllo(isF?'filter':'main')+'<h3>'+(isF?tc('empty_filter_title'):tc('empty_title'))+'</h3><p>'+(isF?tc('empty_filter_sub'):tc('empty_sub'))+'</p>'+(isF?'':'<div class="empty-cta"><button class="btn btn-primary" onclick="goTab(\'add\',document.querySelectorAll(\'.tab\')[2])">'+tc('empty_cta')+'</button></div>')+'</div>';return;}if(currentView==='list'){grid.style.gridTemplateColumns='1fr';grid.innerHTML=list.map(renderListItem).join('');}else{grid.style.gridTemplateColumns='';grid.innerHTML=list.map(renderGridCard).join('');}}

function renderGridCard(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';var th='';if(m.fileData&&m.type==='foto')th='<img src="'+m.fileData+'" alt="">';else if(m.fileData&&m.type==='video')th='<video src="'+m.fileData+'" muted></video><div class="mem-thumb-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';else if(m.fileData&&m.type==='audio')th='<div style="display:flex;flex-direction:column;align-items:center;gap:.3rem"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+cfg.svg+'</svg><span style="font-size:.58rem;color:'+cfg.stroke+';font-weight:700">'+((m.fileName||'audio').slice(0,16))+'</span></div>';else th='<div class="mem-type-icon"><svg viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+cfg.svg+'</svg></div>';return'<div class="mem-card'+(m.type==='hito'?' milestone-card':'')+'" onclick="openMemory(\''+m.id+'\')">'+'<div class="mem-thumb" style="background:'+cfg.bg+'">'+th+'<div class="mem-badge">'+typeLabel+'</div><div class="mem-author-av" style="background:'+(author.color||'#3d6b8e')+'">'+ini(author.name)+'</div>'+(ageStr?'<div class="mem-age-tag">'+ageStr+'</div>':'')+'</div><div class="mem-body">'+(m.type==='hito'?'<div class="mem-milestone-badge">'+typeLabel+'</div>':'')+'<div class="mem-date">'+fmtDate(m.date)+'</div><div class="mem-title">'+m.title+'</div>'+(m.message?'<div class="mem-preview">'+m.message.slice(0,60)+(m.message.length>60?'…':'')+'</div>':'')+'</div></div>';}
function renderListItem(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';return'<div class="mem-card" style="display:flex;align-items:center;gap:.75rem;padding:.75rem .9rem;" onclick="openMemory(\''+m.id+'\')">'+'<div style="width:50px;height:50px;border-radius:12px;background:'+cfg.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">'+cfg.svg+'</svg></div><div style="flex:1;min-width:0"><div style="font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em">'+fmtDate(m.date)+(ageStr?' · '+ageStr:'')+'</div><div style="font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.title+'</div><div style="font-size:.68rem;color:var(--muted)">'+typeLabel+' · '+author.name+'</div></div>'+(m.fileData&&m.type==='foto'?'<img src="'+m.fileData+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">':m.type==='hito'?'<div style="background:var(--accent-light);color:var(--accent);border-radius:8px;padding:.3rem .5rem;font-size:.6rem;font-weight:800">&#9733;</div>':'')+'</div>';}

function renderTimeline(){var tl=document.getElementById('timeline-content');if(!tl||!db)return;var list=db.memories.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});if(!list.length){tl.innerHTML='<div style="text-align:center;padding:3rem 1rem;color:var(--muted)"><p style="font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:.3rem">'+tc('empty_title')+'</p><p style="font-size:.78rem">'+tc('empty_sub')+'</p></div>';return;}var byYear={};list.forEach(function(m){var y=new Date(m.date+'T12:00:00').getFullYear();if(!byYear[y])byYear[y]=[];byYear[y].push(m);});tl.innerHTML=Object.keys(byYear).sort().map(function(year){return'<div class="tl-year">'+year+'</div>'+byYear[year].map(function(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';return'<div class="tl-item'+(m.type==='hito'?' milestone':'')+'" onclick="openMemory(\''+m.id+'\')">'+'<div class="tl-dot"></div><div class="tl-card'+(m.type==='hito'?' milestone':'')+'">'+'<div class="tl-meta"><span class="tl-type">'+typeLabel+'</span>'+(ageStr?'<span class="tl-age">'+ageStr+'</span>':'')+'<span style="font-size:.58rem;color:var(--muted);margin-left:auto">'+fmtDate(m.date)+'</span></div>'+'<div class="tl-title">'+m.title+'</div>'+(m.message?'<div class="tl-preview">'+m.message.slice(0,80)+(m.message.length>80?'…':'')+'</div>':'')+'<div class="tl-author">'+avHtml(author,16)+' '+author.name+'</div></div></div>';}).join('');}).join('');}

function selType(btn){document.querySelectorAll('.type-opt').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');selectedType=btn.dataset.type;clearFile();updateUploadZone();}
function updateUploadZone(){var uf=document.getElementById('upload-field');if(!uf)return;if(selectedType==='hito'){uf.style.display='none';return;}uf.style.display='block';var sub=document.getElementById('uz-sub-text');var ft=t('file_types');if(sub&&ft)sub.textContent=ft[selectedType]||'';var fi=document.getElementById('file-input');if(fi){fi.accept=TYPE_CFG[selectedType]&&TYPE_CFG[selectedType].accept?TYPE_CFG[selectedType].accept:'';fi.value='';}}
function onDragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('dragover');}
function onDragLeave(){document.getElementById('upload-zone').classList.remove('dragover');}
function onDrop(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('dragover');var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)handleFile(f);}
function onFileChange(e){var f=e.target&&e.target.files&&e.target.files[0];if(f)handleFile(f);}
function handleFile(file){var cfg=TYPE_CFG[selectedType];if(!cfg)return;if(cfg.accept){var prefix=cfg.accept.replace('/*','');if(!file.type.startsWith(prefix)){showToast(tc('toast_fill'));return;}}var reader=new FileReader();reader.onload=function(ev){currentFile={file:file,dataURL:ev.target.result,mimeType:file.type};renderFilePreview(file,ev.target.result);};reader.readAsDataURL(file);}
function renderFilePreview(file,dataURL){var fp=document.getElementById('file-preview');if(!fp)return;fp.style.display='flex';var thumb=document.getElementById('fp-thumb');if(file.type.startsWith('image'))thumb.innerHTML='<img src="'+dataURL+'" alt="">';else if(file.type.startsWith('video'))thumb.innerHTML='<video src="'+dataURL+'" muted></video>';else thumb.innerHTML='<div style="font-size:1.4rem">&#127925;</div>';document.getElementById('fp-name').textContent=file.name;document.getElementById('fp-size').textContent=fmtBytes(file.size);}
function clearFile(){currentFile=null;var fp=document.getElementById('file-preview');if(fp)fp.style.display='none';var fi=document.getElementById('file-input');if(fi)fi.value='';}
function saveMemory(){var title=document.getElementById('add-title').value.trim();if(!title){showToast(tc('toast_no_title'));return;}var m={id:uid(),type:selectedType,title:title,date:document.getElementById('add-date').value||new Date().toISOString().split('T')[0],message:document.getElementById('add-msg').value.trim(),authorId:currentUser.id,createdAt:new Date().toISOString()};if(currentFile){m.fileData=currentFile.dataURL;m.fileName=currentFile.file.name;m.fileMime=currentFile.mimeType;}db.memories.push(m);saveDB();driveAutoSave();document.getElementById('add-title').value='';document.getElementById('add-msg').value='';document.getElementById('add-date').valueAsDate=new Date();clearFile();showToast(tc('toast_saved'));goTab('memories',document.querySelector('.tab'));}

function openMemory(id){var m=db.memories.find(function(x){return x.id===id;});if(!m)return;openMemoryId=id;var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var canDelete=currentUser.role==='admin'||currentUser.id===m.authorId;var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';document.getElementById('mem-modal-title').textContent=m.title;document.getElementById('mem-modal-sub').textContent=typeLabel+' · '+fmtDate(m.date)+(ageStr?' · '+ageStr:'');document.getElementById('mem-delete-btn').style.display=canDelete?'':'none';var media='';if(m.fileData&&m.type==='foto')media='<img src="'+m.fileData+'" alt="" style="width:100%;border-radius:10px;margin-bottom:.85rem;max-height:300px;object-fit:cover">';else if(m.fileData&&m.type==='video')media='<video src="'+m.fileData+'" controls style="width:100%;border-radius:10px;margin-bottom:.85rem;max-height:280px"></video>';else if(m.fileData&&m.type==='audio')media='<audio src="'+m.fileData+'" controls style="width:100%;margin-bottom:.85rem"></audio>';document.getElementById('mem-modal-body').innerHTML=media+'<div style="width:44px;height:44px;border-radius:12px;background:'+cfg.bg+';display:flex;align-items:center;justify-content:center;margin-bottom:.78rem"><svg viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">'+cfg.svg+'</svg></div><div style="display:flex;align-items:center;gap:.46rem;margin-bottom:.78rem">'+avHtml(author,26)+'<span style="font-size:.76rem;color:var(--muted)"><strong style="color:var(--text)">'+author.name+'</strong> · '+fmtDate(m.date)+'</span></div>'+(ageStr?'<div style="background:var(--accent-light);color:var(--accent);border-radius:8px;padding:.4rem .7rem;font-size:.76rem;font-weight:700;margin-bottom:.78rem">'+db.capsule.childName+' tenía '+ageStr+'</div>':'')+(m.message?'<div style="background:var(--bg);border-left:3px solid var(--accent);border-radius:8px;padding:.8rem;font-size:.82rem;line-height:1.7">'+m.message+'</div>':'');openModal('overlay-memory');}
function deleteMemory(){db.memories=db.memories.filter(function(m){return m.id!==openMemoryId;});saveDB();closeModal('overlay-memory');renderMemories();renderStats();showToast(tc('toast_deleted'));}

function renderUsersAdmin(){if(!db)return;document.getElementById('users-admin-list').innerHTML=db.users.map(function(u){var count=db.memories.filter(function(m){return m.authorId===u.id;}).length;var isSelf=u.id===currentUser.id;return'<div class="user-admin-item"><div class="uai-left">'+avHtml(u,40)+'<div><div class="uai-name">'+u.name+(isSelf?' <span style="font-size:.63rem;color:var(--muted)">('+tc('you')+')</span>':'')+'</div><div class="uai-meta"><span class="role-badge '+(u.role)+'">'+( u.role==='admin'?'Admin':tc('role_member'))+'</span>· '+count+' '+tf('memories_word')(count)+(u.email?' · '+maskEmail(u.email):'')+'</div></div></div><div class="uai-actions"><button class="btn btn-secondary btn-sm" onclick="openUserDetail(\''+u.id+'\')">'+tc('btn_edit')+'</button></div></div>';}).join('');}
function openNewUserModal(){buildColorPicker('nu-color-picker',COLORS[1]);['nu-p0','nu-p1','nu-p2','nu-p3'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('nu-name').value='';document.getElementById('nu-email').value='';document.getElementById('nu-role').value='member';document.getElementById('nu-access-preview').style.display='none';applyI18n();openModal('overlay-new-user');}
function previewAccess(){var name=document.getElementById('nu-name').value.trim();var pin=getPin(['nu-p0','nu-p1','nu-p2','nu-p3']);if(!name){showToast(tc('toast_fill'));return;}if(pin.length<4){showToast(tc('toast_short_pin'));return;}document.getElementById('nu-invite-msg').textContent=tf('invite')(name,pin,document.getElementById('nu-role').value,db.capsule.childName,db.capsule.openAge);document.getElementById('nu-access-preview').style.display='block';}
function saveNewUser(){var name=document.getElementById('nu-name').value.trim();var email=document.getElementById('nu-email').value.trim().toLowerCase();var pin=getPin(['nu-p0','nu-p1','nu-p2','nu-p3']);if(!name){showToast(tc('toast_fill'));return;}if(pin.length<4){showToast(tc('toast_short_pin'));return;}if(email&&!email.includes('@')){showToast(tc('toast_invalid_email'));return;}db.users.push({id:uid(),name:name,email:email,role:document.getElementById('nu-role').value,color:getPickerColor('nu-color-picker'),pin:pin,createdAt:new Date().toISOString()});saveDB();closeModal('overlay-new-user');renderUsersAdmin();showToast(tf('toast_user_added')(name));}
function openUserDetail(userId){editingUserId=userId;var u=db.users.find(function(x){return x.id===userId;});if(!u)return;var isSelf=userId===currentUser.id;var count=db.memories.filter(function(m){return m.authorId===userId;}).length;document.getElementById('ud-title').textContent=u.name;document.getElementById('ud-sub').textContent=(u.role==='admin'?tc('role_admin'):tc('role_member'))+' · '+count+' '+tf('memories_word')(count);document.getElementById('ud-delete-btn').style.display=isSelf?'none':'';document.getElementById('ud-save-btn').style.display=isSelf?'none':'';document.getElementById('ud-body').innerHTML='<div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1.1rem;padding-bottom:.95rem;border-bottom:1px solid var(--border)">'+avHtml(u,44)+'<div><div style="font-size:.93rem;font-weight:800">'+u.name+'</div><div style="font-size:.68rem;color:var(--muted);margin-top:.12rem">'+(u.email?maskEmail(u.email):'—')+'</div></div></div>'+(!isSelf?'<div class="form-field"><label>'+tc('set_name')+'</label><input type="text" id="ud-name" value="'+u.name+'"></div><div class="form-field"><label>'+tc('field_email')+'</label><input type="email" id="ud-email" value="'+(u.email||'')+'"></div><div class="form-field"><label>'+tc('nu_role')+'</label><select id="ud-role"><option value="member"'+(u.role==='member'?' selected':'')+'>'+tc('role_member')+'</option><option value="admin"'+(u.role==='admin'?' selected':'')+'>Admin</option></select></div><div class="form-field"><label>'+tc('field_color')+'</label><div class="color-picker" id="ud-color-picker"></div></div><div class="form-field"><label>'+tc('nu_pin')+'</label><div class="pin-row" style="justify-content:flex-start"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p0" oninput="pinMove(this,null,\'ud-p1\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p1" oninput="pinMove(this,\'ud-p0\',\'ud-p2\')" onkeydown="pinBack(event,\'ud-p0\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p2" oninput="pinMove(this,\'ud-p1\',\'ud-p3\')" onkeydown="pinBack(event,\'ud-p1\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p3" oninput="pinMove(this,\'ud-p2\',null)" onkeydown="pinBack(event,\'ud-p2\')"></div></div>':'')+'<div class="access-box"><div class="ab-label">'+tc('nu_preview')+'</div><div class="access-code">'+u.pin+'</div><div style="font-size:.7rem;color:var(--muted);margin-bottom:.48rem">'+tc('set_email_rec')+': <strong>'+(u.email||'—')+'</strong></div><button class="copy-btn" onclick="copyInvite(\''+u.id+'\')">&#128203; '+tc('nu_preview_btn')+'</button></div>';if(!isSelf)buildColorPicker('ud-color-picker',u.color);openModal('overlay-user-detail');}
function saveUserEdit(){var u=db.users.find(function(x){return x.id===editingUserId;});if(!u)return;var name=document.getElementById('ud-name').value.trim();if(!name){showToast(tc('toast_fill'));return;}u.name=name;u.email=document.getElementById('ud-email').value.trim().toLowerCase();u.role=document.getElementById('ud-role').value;u.color=getPickerColor('ud-color-picker');var np=getPin(['ud-p0','ud-p1','ud-p2','ud-p3']);if(np.length===4)u.pin=np;saveDB();closeModal('overlay-user-detail');renderUsersAdmin();showToast(tc('toast_changes'));}
function deleteUserConfirm(){var u=db.users.find(function(x){return x.id===editingUserId;});if(!u)return;db.users=db.users.filter(function(x){return x.id!==editingUserId;});saveDB();closeModal('overlay-user-detail');renderUsersAdmin();showToast(tf('toast_user_deleted')(u.name));}
function copyInvite(userId){var u=db.users.find(function(x){return x.id===userId;});if(!u)return;navigator.clipboard.writeText(tf('invite')(u.name,u.pin,u.role,db.capsule.childName,db.capsule.openAge)).then(function(){showToast(tc('toast_copied'));}).catch(function(){showToast(tc('toast_copied'));});}

function renderSettings(){if(!db||!currentUser)return;var isAdmin=currentUser.role==='admin';document.getElementById('set-child-name').textContent=db.capsule.childName;document.getElementById('set-open-date').textContent=unlockDate(db.capsule.birth,db.capsule.openAge)+' ('+tf('open_in')(db.capsule.openAge)+')';document.getElementById('set-my-name').textContent=currentUser.name;document.getElementById('set-my-email-desc').textContent=currentUser.email?maskEmail(currentUser.email):'—';var rb=document.getElementById('set-my-role');if(rb){rb.textContent=currentUser.role==='admin'?'Admin':tc('role_member');rb.className='role-badge '+currentUser.role;}var prefs=JSON.parse(localStorage.getItem('kintu_reminder_prefs')||'{"monthly":true,"birthday":true}');var tm=document.getElementById('toggle-monthly'),tb=document.getElementById('toggle-birthday');if(tm)tm.checked=prefs.monthly!==false;if(tb)tb.checked=prefs.birthday!==false;renderLangSelect();updateDriveUI();applyI18n();}
function openEditCapsuleModal(){document.getElementById('ec-name').value=db.capsule.childName;document.getElementById('ec-birth').value=db.capsule.birth;document.getElementById('ec-age').value=db.capsule.openAge;openModal('overlay-edit-capsule');}
function saveCapsuleEdit(){var name=document.getElementById('ec-name').value.trim(),birth=document.getElementById('ec-birth').value;if(!name||!birth){showToast(tc('toast_fill'));return;}db.capsule.childName=name;db.capsule.birth=birth;db.capsule.openAge=parseInt(document.getElementById('ec-age').value);saveDB();closeModal('overlay-edit-capsule');renderSettings();renderCountdown();showToast(tc('toast_capsule_updated'));}
function openChangePinModal(){['cp0','cp1','cp2','cp3'].forEach(function(id){document.getElementById(id).value='';});openModal('overlay-change-pin');}
function saveChangedPin(){var pin=getPin(['cp0','cp1','cp2','cp3']);if(pin.length<4){showToast(tc('toast_short_pin'));return;}var u=db.users.find(function(x){return x.id===currentUser.id;});if(!u)return;u.pin=pin;currentUser.pin=pin;saveDB();closeModal('overlay-change-pin');showToast(tc('toast_pin_updated'));}
function openEditProfileModal(){document.getElementById('ep-name').value=currentUser.name;document.getElementById('ep-email').value=currentUser.email||'';buildColorPicker('ep-color-picker',currentUser.color);openModal('overlay-edit-profile');}
function saveEditProfile(){var name=document.getElementById('ep-name').value.trim();if(!name){showToast(tc('toast_fill'));return;}var email=document.getElementById('ep-email').value.trim().toLowerCase();if(email&&!email.includes('@')){showToast(tc('toast_invalid_email'));return;}var color=getPickerColor('ep-color-picker');var u=db.users.find(function(x){return x.id===currentUser.id;});if(!u)return;u.name=name;u.email=email;u.color=color;currentUser.name=name;currentUser.email=email;currentUser.color=color;saveDB();var av=document.getElementById('tb-avatar');if(av){av.style.background=color;av.textContent=ini(name);}var tn=document.getElementById('tb-name');if(tn)tn.textContent=name;closeModal('overlay-edit-profile');renderSettings();if(currentUser.role==='admin')renderUsersAdmin();showToast(tc('toast_profile_updated'));}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){var el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2600);}
</script>
</body>
</html>
