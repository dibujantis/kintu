var editingUserId=null,openMemoryList=[],openMemoryIdx=0,loginSelectedUser=null,loginPinEntry='',setupStep=1,currentFile=null,confirmCallback=null;

function getDB(){try{return JSON.parse(localStorage.getItem(SK)||'null');}catch(e){return null;}}
function saveDB(){localStorage.setItem(SK,JSON.stringify(db));}
function uid(){return '_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function ini(n){return((n||'?').trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2))||'??';}
function avHtml(u,s){s=s||36;return'<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:'+(s*.27)+'px;font-weight:800;color:#fff;flex-shrink:0;background:'+(u.color||COLORS[0])+'">'+ini(u.name)+'</div>';}
function fmtDate(iso){if(!iso)return'—';try{return new Date(iso+'T12:00:00').toLocaleDateString(lang,{day:'numeric',month:'long',year:'numeric'});}catch(e){return iso;}}
function unlockDate(birth,age){try{var d=new Date(birth);d.setFullYear(d.getFullYear()+age);return d.toLocaleDateString(lang,{day:'numeric',month:'long',year:'numeric'});}catch(e){return'';}}
function countdown(birth,age){try{var u=new Date(birth);u.setFullYear(u.getFullYear()+age);var diff=u-new Date();if(diff<=0)return tc('moment');var days=Math.floor(diff/864e5),y=Math.floor(days/365),m=Math.floor((days%365)/30);if(y>0)return tf('years_months')(y,m);if(m>0)return tf('months_days')(m,days%30);return tf('days')(days);}catch(e){return'—';}}
function maskEmail(e){if(!e)return'—';var parts=e.split('@');return(parts[0]||'').slice(0,2)+'***@'+(parts[1]||'');}
function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function daysAlive(birth){try{return Math.max(0,Math.floor((new Date()-new Date(birth))/864e5));}catch(e){return 0;}}
function ageAtDate(birthStr,dateStr){if(!birthStr||!dateStr)return null;try{var birth=new Date(birthStr),date=new Date(dateStr+'T12:00:00');var years=date.getFullYear()-birth.getFullYear(),months=date.getMonth()-birth.getMonth();if(months<0){years--;months+=12;}return{years:Math.max(0,years),months:Math.max(0,months)};}catch(e){return null;}}
function capsuleProgress(){if(!db||!db.capsule||!db.capsule.birth)return 0;try{var birth=new Date(db.capsule.birth),unlock=new Date(birth);unlock.setFullYear(unlock.getFullYear()+db.capsule.openAge);var total=unlock-birth,elapsed=new Date()-birth;return Math.max(0,Math.min(100,Math.round((elapsed/total)*100)));}catch(e){return 0;}}

// ═══ BOOT ═══
window.onload=function(){applyI18n();renderLangSelect();db=getDB();if(!db){show('screen-setup');initSetup();}else{try{var u=new Date(db.capsule.birth);u.setFullYear(u.getFullYear()+db.capsule.openAge);if(new Date()>=u){show('screen-opening');initOpeningScreen();return;}}catch(e){}initDriveFromStorage();show('screen-login');initLogin();}};
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

// ═══ OPENING ═══
function initOpeningScreen(){if(!db)return;var n=db.capsule.childName||'';document.getElementById('opening-title').textContent=tf('opening_title')(n);document.getElementById('opening-sub').textContent=tc('opening_sub');var stars=document.getElementById('opening-stars');stars.innerHTML=Array.from({length:18},function(){var s=8+Math.random()*14;return'<span style="display:inline-block;width:'+s+'px;height:'+s+'px;background:rgba(255,255,255,'+((.2+Math.random()*.5).toFixed(2))+');border-radius:50%;margin:'+(Math.random()*6)+'px"></span>';}).join('');}
function openCapsuleReveal(){show('screen-login');initLogin();}

// ═══ REMINDERS ═══
function checkReminders(){if(!db||!db.capsule)return;var prefs=JSON.parse(localStorage.getItem('kintu_reminder_prefs')||'{"monthly":true,"birthday":true}');var today=new Date();if(prefs.birthday){try{var b=new Date(db.capsule.birth);if(b.getMonth()===today.getMonth()&&b.getDate()===today.getDate()){showReminderBanner(tf('birthday_reminder_title')(db.capsule.childName),tc('birthday_reminder_sub'));return;}}catch(e){}}if(prefs.monthly){var last=localStorage.getItem('kintu_reminder_dismiss');if(last&&(today-new Date(last))<30*864e5)return;var sorted=db.memories.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});var lm=sorted[0];if(!lm||(today-new Date(lm.createdAt))>30*864e5)showReminderBanner(tc('reminder_title'),tc('reminder_sub'));}}
function showReminderBanner(title,sub){var ban=document.getElementById('reminder-banner');if(!ban)return;document.getElementById('rb-title').textContent=title;document.getElementById('rb-sub').textContent=sub;ban.style.display='flex';var bell=document.getElementById('notif-bell');if(bell&&!bell.querySelector('.notif-badge')){var bd=document.createElement('div');bd.className='notif-badge';bell.appendChild(bd);}}
function dismissReminder(){var ban=document.getElementById('reminder-banner');if(ban)ban.style.display='none';localStorage.setItem('kintu_reminder_dismiss',new Date().toISOString());var bd=document.querySelector('.notif-badge');if(bd)bd.remove();}
function toggleNotifPanel(){var ban=document.getElementById('reminder-banner');if(ban)ban.style.display=ban.style.display==='none'||ban.style.display===''?'flex':'none';}
function saveReminderPrefs(){var prefs={monthly:document.getElementById('toggle-monthly').checked,birthday:document.getElementById('toggle-birthday').checked};localStorage.setItem('kintu_reminder_prefs',JSON.stringify(prefs));}

// ═══ SETUP ═══
function initSetup(){var dots=document.getElementById('setup-dots');dots.innerHTML=Array.from({length:3},function(_,i){return'<div class="si-dot" id="sdot-'+(i+1)+'"></div>';}).join('');updateSetupDots();buildColorPicker('s-color-picker',COLORS[0]);document.getElementById('setup-header').innerHTML=buildHeaderHTML('',tc('setup_tagline'));applyI18n();}
function updateSetupDots(){for(var i=1;i<=3;i++)document.getElementById('sdot-'+i).classList.toggle('done',i<=setupStep);}
function setupNext(f){if(f===1){if(!document.getElementById('s-child-name').value.trim()||!document.getElementById('s-birth').value){showToast(tc('toast_fill'));return;}}if(f===2){if(!document.getElementById('s-admin-name').value.trim()){showToast(tc('toast_fill'));return;}var e=document.getElementById('s-admin-email').value.trim();if(e&&!e.includes('@')){showToast(tc('toast_invalid_email'));return;}}document.getElementById('step-'+f).classList.remove('active');setupStep=f+1;document.getElementById('step-'+setupStep).classList.add('active');updateSetupDots();}
function setupPrev(f){document.getElementById('step-'+f).classList.remove('active');setupStep=f-1;document.getElementById('step-'+setupStep).classList.add('active');updateSetupDots();}
function setupFinish(){var pin=['sp0','sp1','sp2','sp3'].map(function(id){return document.getElementById(id).value;}).join('');if(pin.length<4){showToast(tc('toast_short_pin'));return;}var childName=document.getElementById('s-child-name').value.trim();db={capsule:{childName:childName,birth:document.getElementById('s-birth').value,openAge:parseInt(document.getElementById('s-open-age').value)},users:[{id:uid(),name:document.getElementById('s-admin-name').value.trim(),email:document.getElementById('s-admin-email').value.trim().toLowerCase(),role:'admin',color:getPickerColor('s-color-picker'),pin:pin,createdAt:new Date().toISOString()}],memories:[],welcomeLetter:'',reactions:{}};saveDB();showToast(tc('toast_created'));setTimeout(function(){show('screen-login');initLogin();},700);}
function buildColorPicker(cid,def){document.getElementById(cid).innerHTML=COLORS.map(function(c){return'<div class="color-swatch'+(c===def?' sel':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this)"></div>';}).join('');}
function pickColor(el){el.closest('.color-picker').querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('sel');});el.classList.add('sel');}
function getPickerColor(cid){var s=document.querySelector('#'+cid+' .color-swatch.sel');return s?s.dataset.color:COLORS[0];}
function pinMove(el,p,n){if(el.value&&n)document.getElementById(n).focus();}
function pinBack(e,p){if(e.key==='Backspace'&&!e.target.value&&p)document.getElementById(p).focus();}
function getPin(ids){return ids.map(function(id){return document.getElementById(id).value;}).join('');}

// ═══ LOGIN ═══
function initLogin(){db=getDB();var childName=db&&db.capsule?db.capsule.childName:'';document.getElementById('login-header').innerHTML=buildHeaderHTML(childName,'');renderLoginUsers();loginPinEntry='';loginSelectedUser=null;document.getElementById('pin-section').style.display='none';document.getElementById('login-error').textContent='';document.getElementById('login-user-section').style.display='block';hideRecover();applyI18n();}
function renderLoginUsers(){document.getElementById('login-user-list').innerHTML=db.users.map(function(u){return'<div class="user-item" id="li-'+u.id+'" onclick="selectLoginUser(\''+u.id+'\')">'+(avHtml(u,36))+'<div><div class="ui-name">'+u.name+'</div><div class="ui-role">'+(u.role==='admin'?tc('role_admin'):tc('role_member'))+'</div></div><div style="margin-left:auto;color:var(--muted)">&#8250;</div></div>';}).join('');}
function selectLoginUser(id){loginSelectedUser=db.users.find(function(u){return u.id===id;});if(!loginSelectedUser)return;document.querySelectorAll('.user-item').forEach(function(el){el.classList.remove('selected');});document.getElementById('li-'+id).classList.add('selected');loginPinEntry='';document.getElementById('login-error').textContent='';renderPinDots();document.getElementById('pin-section').style.display='block';document.getElementById('pin-label').textContent=tf('pin_label')(loginSelectedUser.name);renderNumpad();}
function renderPinDots(){document.getElementById('pin-dots').innerHTML=Array.from({length:4},function(_,i){return'<div class="pin-dot'+(i<loginPinEntry.length?' filled':'')+'"></div>';}).join('');}
function renderNumpad(){document.getElementById('numpad').innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'&#9003;'].map(function(d){if(d==='')return'<div></div>';if(d==='&#9003;')return'<button class="numpad-btn del" onclick="numpadDel()">&#9003;</button>';return'<button class="numpad-btn" onclick="numpadPress(\''+d+'\')">'+d+'</button>';}).join('');}
function numpadPress(d){if(loginPinEntry.length>=4)return;loginPinEntry+=d;renderPinDots();if(loginPinEntry.length===4)setTimeout(tryLogin,200);}
function numpadDel(){loginPinEntry=loginPinEntry.slice(0,-1);renderPinDots();document.getElementById('login-error').textContent='';}
function tryLogin(){if(!loginSelectedUser)return;if(loginPinEntry===loginSelectedUser.pin){currentUser=loginSelectedUser;show('screen-app');initApp();}else{document.getElementById('login-error').textContent=tc('wrong_pin');loginPinEntry='';renderPinDots();}}
function logout(){currentUser=null;show('screen-login');initLogin();}
function showRecover(){document.getElementById('pin-section').style.display='none';document.getElementById('login-user-section').style.display='none';document.getElementById('recover-box').classList.add('active');document.getElementById('recover-email').value='';document.getElementById('recover-sent').classList.remove('show');applyI18n();}
function hideRecover(){document.getElementById('recover-box').classList.remove('active');document.getElementById('login-user-section').style.display='block';document.getElementById('pin-section').style.display='none';loginSelectedUser=null;loginPinEntry='';document.querySelectorAll('.user-item').forEach(function(el){el.classList.remove('selected');});}
function sendRecoverPin(){var email=document.getElementById('recover-email').value.trim().toLowerCase();if(!email||!email.includes('@')){showToast(tc('toast_invalid_email'));return;}var user=db.users.find(function(u){return u.email&&u.email.toLowerCase()===email;});var box=document.getElementById('recover-sent');box.classList.add('show');box.innerHTML=user?tf('recover_found')(user.name,user.pin):tc('recover_notfound');}

// ═══ APP ═══
function initApp(){db=getDB();var isAdmin=currentUser.role==='admin';var childName=db.capsule.childName;document.getElementById('app-header-logo').innerHTML=buildTopbarLogo(childName);var av=document.getElementById('tb-avatar');av.style.background=currentUser.color||COLORS[0];av.textContent=ini(currentUser.name);document.getElementById('tb-name').textContent=currentUser.name;document.querySelectorAll('.admin-only').forEach(function(el){el.style.display=isAdmin?'':'none';});document.getElementById('admin-change-capsule').style.display=isAdmin?'flex':'none';applyI18n();renderLangSelect();updateDriveUI();goTab('memories',document.querySelector('.tab'));document.getElementById('add-date').valueAsDate=new Date();var ft=document.querySelector('.type-opt.active');if(ft)selType(ft);checkReminders();renderWelcomeLetterBanner();}

function goTab(name,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});if(btn)btn.classList.add('active');var el=document.getElementById('tab-'+name);if(el)el.classList.add('active');if(name==='memories'){renderCountdown();renderDaysAlive();renderProgress();renderStats();renderMemories();}if(name==='timeline'){openMemoryList=db.memories.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});renderTimeline();}if(name==='users'&&currentUser&&currentUser.role==='admin')renderUsersAdmin();if(name==='settings')renderSettings();if(name==='add'){document.getElementById('add-title').value='';document.getElementById('add-msg').value='';document.getElementById('add-date').valueAsDate=new Date();clearFile();}}

function renderCountdown(){if(!db||!db.capsule)return;document.getElementById('cap-name-banner').textContent=db.capsule.childName;document.getElementById('cap-countdown').textContent=countdown(db.capsule.birth,db.capsule.openAge);}
function renderDaysAlive(){if(!db||!db.capsule||!db.capsule.birth)return;var d=daysAlive(db.capsule.birth);document.getElementById('days-alive-text').textContent=tf('days_alive')(d.toLocaleString());}
function renderProgress(){var p=capsuleProgress();document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-label-left').textContent=tf('progress_done')(p);var yrsLeft=Math.max(0,db.capsule.openAge-Math.floor((new Date()-new Date(db.capsule.birth))/(365.25*864e5)));document.getElementById('progress-label-right').textContent=yrsLeft>0?yrsLeft+' '+tc('open_in').replace(/\d+/,'').trim():'';}
function renderStats(){if(!db)return;var m=db.memories;document.getElementById('st-total').textContent=m.length;document.getElementById('st-photos').textContent=m.filter(function(x){return x.type==='foto'||x.type==='video';}).length;document.getElementById('st-audio').textContent=m.filter(function(x){return x.type==='audio';}).length;document.getElementById('st-hitos').textContent=m.filter(function(x){return x.type==='hito';}).length;}
function setFilter(btn){document.querySelectorAll('.f-chip').forEach(function(c){c.classList.remove('active');});btn.classList.add('active');selectedFilter=btn.dataset.f;renderMemories();}
function setView(v,btn){currentView=v;document.querySelectorAll('.vt-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderMemories();}

// ═══ SEARCH ═══
function onSearch(q){searchQuery=q.trim();document.getElementById('search-clear').classList.toggle('show',q.length>0);renderMemories();}
function clearSearch(){searchQuery='';document.getElementById('search-input').value='';document.getElementById('search-clear').classList.remove('show');renderMemories();}
function getFilteredMemories(){var list=db.memories.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});if(selectedFilter!=='all')list=list.filter(function(m){return m.type===selectedFilter;});if(searchQuery){var q=searchQuery.toLowerCase();list=list.filter(function(m){return(m.title||'').toLowerCase().includes(q)||(m.message||'').toLowerCase().includes(q);});}return list;}

function emptyIllo(type){var C='#6b7f8e';if(type==='search')return'<svg class="illo" viewBox="0 0 160 140" fill="none"><circle cx="72" cy="66" r="38" fill="#e8ecef" stroke="#b0bec5" stroke-width="2.5"/><line x1="100" y1="94" x2="128" y2="122" stroke="#b0bec5" stroke-width="6" stroke-linecap="round"/><line x1="58" y1="58" x2="86" y2="58" stroke="'+C+'" stroke-width="3" stroke-linecap="round" opacity=".4"/><line x1="58" y1="68" x2="76" y2="68" stroke="'+C+'" stroke-width="3" stroke-linecap="round" opacity=".25"/></svg>';if(type==='filter')return'<svg class="illo" viewBox="0 0 160 140" fill="none"><rect x="20" y="30" width="120" height="80" rx="14" fill="#e8ecef"/><rect x="35" y="50" width="90" height="10" rx="5" fill="#b0bec5" opacity=".6"/><rect x="35" y="68" width="60" height="10" rx="5" fill="#b0bec5" opacity=".35"/></svg>';return'<svg class="illo" viewBox="0 0 160 140" fill="none"><rect x="15" y="40" width="130" height="85" rx="16" fill="#e8ecef"/><rect x="30" y="15" width="100" height="70" rx="12" fill="#f4f6f7" stroke="#b0bec5" stroke-width="2"/><path d="M30 35L80 58L130 35" stroke="#b0bec5" stroke-width="1.8" fill="none"/><path d="M80 68C80 68 66 56 66 48C66 42 71 38 75 39C77 39.5 80 42 80 42C80 42 83 39.5 85 39C89 38 94 42 94 48C94 56 80 68 80 68Z" fill="'+C+'" opacity=".55"/><circle cx="125" cy="105" r="22" fill="#eceff1" stroke="#b0bec5" stroke-width="2"/><path d="M125 96L125 106" stroke="'+C+'" stroke-width="3" stroke-linecap="round"/><circle cx="125" cy="112" r="2.5" fill="'+C+'"/></svg>';}

// ═══ REACTIONS ═══
function reactionsFor(memId){var r=db.reactions||{};return r[memId]||{};}
function renderReactionsHTML(m){var r=reactionsFor(m.id);return'<div class="mem-reactions">'+REACTIONS.map(function(emoji){var count=r[emoji]?r[emoji].length:0;var isMine=r[emoji]&&r[emoji].indexOf(currentUser.id)>=0;return'<button class="react-btn'+(isMine?' active':'')+'" onclick="toggleReaction(event,\''+m.id+'\',\''+encodeURIComponent(emoji)+'\')">'+emoji+(count>0?'<span class="react-count">'+count+'</span>':'')+'</button>';}).join('')+'</div>';}
function toggleReaction(e,memId,emojiEncoded){e.stopPropagation();var emoji=decodeURIComponent(emojiEncoded);if(!db.reactions)db.reactions={};if(!db.reactions[memId])db.reactions[memId]={};var arr=db.reactions[memId][emoji]||[];var idx=arr.indexOf(currentUser.id);if(idx>=0)arr.splice(idx,1);else arr.push(currentUser.id);db.reactions[memId][emoji]=arr;saveDB();renderMemories();}

// ═══ MEMORY RENDER ═══
function renderMemories(){var grid=document.getElementById('memory-grid');if(!grid||!db)return;var list=getFilteredMemories();openMemoryList=list;if(!list.length){var type=searchQuery?'search':(selectedFilter!=='all'?'filter':'main');grid.style.gridTemplateColumns='1fr';var et=searchQuery?tc('empty_search_title'):(selectedFilter!=='all'?tc('empty_filter_title'):tc('empty_title'));var es=searchQuery?tc('empty_search_sub'):(selectedFilter!=='all'?tc('empty_filter_sub'):tc('empty_sub'));grid.innerHTML='<div class="empty-state">'+emptyIllo(type)+'<h3>'+et+'</h3><p>'+es+'</p>'+((!searchQuery&&selectedFilter==='all')?'<div class="empty-cta"><button class="btn btn-primary" onclick="goTab(\'add\',document.querySelectorAll(\'.tab\')[2])">'+tc('empty_cta')+'</button></div>':'')+'</div>';return;}if(currentView==='list'){grid.style.gridTemplateColumns='1fr';grid.innerHTML=list.map(renderListItem).join('');}else{grid.style.gridTemplateColumns='';grid.innerHTML=list.map(renderGridCard).join('');}}

function renderGridCard(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';var th='';if(m.fileData&&m.type==='foto')th='<img src="'+m.fileData+'" alt="">';else if(m.fileData&&m.type==='video')th='<video src="'+m.fileData+'" muted></video><div class="mem-thumb-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';else if(m.fileData&&m.type==='audio')th='<div style="display:flex;flex-direction:column;align-items:center;gap:.3rem"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+cfg.svg+'</svg></div>';else th='<div class="mem-type-icon"><svg viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+cfg.svg+'</svg></div>';var idx=openMemoryList.findIndex(function(x){return x.id===m.id;});return'<div class="mem-card" onclick="openMemory(\''+m.id+'\','+idx+')">'+'<div class="mem-thumb" style="background:'+cfg.bg+'">'+th+'<div class="mem-badge">'+typeLabel+'</div><div class="mem-author-av" style="background:'+(author.color||'#3d6b8e')+'">'+ini(author.name)+'</div>'+(ageStr?'<div class="mem-age-tag">'+ageStr+'</div>':'')+'</div><div class="mem-body">'+(m.type==='hito'?'<div class="mem-milestone-badge">'+typeLabel+'</div>':'')+'<div class="mem-date">'+fmtDate(m.date)+'</div><div class="mem-title">'+m.title+'</div>'+(m.message?'<div class="mem-preview">'+m.message.slice(0,60)+(m.message.length>60?'…':'')+'</div>':'')+'</div>'+renderReactionsHTML(m)+'</div>';}

function renderListItem(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';var idx=openMemoryList.findIndex(function(x){return x.id===m.id;});return'<div class="mem-card" style="display:flex;align-items:center;gap:.75rem;padding:.75rem .9rem;" onclick="openMemory(\''+m.id+'\','+idx+')">'+'<div style="width:50px;height:50px;border-radius:12px;background:'+cfg.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="'+cfg.stroke+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">'+cfg.svg+'</svg></div><div style="flex:1;min-width:0"><div style="font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em">'+fmtDate(m.date)+(ageStr?' · '+ageStr:'')+'</div><div style="font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.title+'</div><div style="font-size:.68rem;color:var(--muted)">'+typeLabel+' · '+author.name+'</div></div>'+(m.fileData&&m.type==='foto'?'<img src="'+m.fileData+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">':m.type==='hito'?'<div style="background:var(--accent-light);color:var(--accent);border-radius:8px;padding:.3rem .5rem;font-size:.6rem;font-weight:800">★</div>':'')+'</div>';}

// ═══ TIMELINE ═══
function renderTimeline(){var tl=document.getElementById('timeline-content');if(!tl||!db)return;var list=db.memories.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});if(!list.length){tl.innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.85rem">'+tc('empty_title')+'</div>';return;}var byYear={};list.forEach(function(m){var y=m.date?m.date.slice(0,4):'?';if(!byYear[y])byYear[y]=[];byYear[y].push(m);});tl.innerHTML=Object.keys(byYear).sort().map(function(y){return'<div class="tl-year">'+y+'</div>'+byYear[y].map(function(m){var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';var idx=openMemoryList.findIndex(function(x){return x.id===m.id;});return'<div class="tl-item'+(m.type==='hito'?' milestone':'')+'" onclick="openMemory(\''+m.id+'\','+idx+')">'+'<div class="tl-dot"></div><div class="tl-card'+(m.type==='hito'?' milestone':'')+'">'+'<div class="tl-meta"><span class="tl-type">'+tc('type_'+TYPE_KEY[m.type])+'</span>'+(ageStr?'<span class="tl-age">'+ageStr+'</span>':'')+'</div>'+'<div class="tl-title">'+m.title+'</div>'+(m.message?'<div class="tl-preview">'+m.message.slice(0,80)+(m.message.length>80?'…':'')+'</div>':'')+'<div class="tl-author">'+avHtml(author,14)+'<span>'+author.name+' · '+fmtDate(m.date)+'</span></div>'+'</div></div>';}).join('');}).join('');}

// ═══ MEMORY MODAL ═══
function openMemory(id,idx){var list=getFilteredMemories();openMemoryList=list;openMemoryIdx=(idx!==undefined&&idx>=0)?idx:list.findIndex(function(x){return x.id===id;});if(openMemoryIdx<0)openMemoryIdx=0;renderMemoryModal();openModal('overlay-memory');}
function navMemory(dir){openMemoryIdx=Math.max(0,Math.min(openMemoryList.length-1,openMemoryIdx+dir));renderMemoryModal();}
function renderMemoryModal(){var m=openMemoryList[openMemoryIdx];if(!m)return;var cfg=TYPE_CFG[m.type]||TYPE_CFG.foto;var author=db.users.find(function(u){return u.id===m.authorId;})||{name:'?',color:'#999'};var canDelete=currentUser.role==='admin'||currentUser.id===m.authorId;var typeLabel=tc('type_'+TYPE_KEY[m.type]);var age=ageAtDate(db.capsule.birth,m.date);var ageStr=age&&age.years>=0?tf('age_at')(age.years,age.months):'';document.getElementById('mem-modal-title').textContent=m.title;document.getElementById('mem-modal-sub').textContent=typeLabel+' · '+fmtDate(m.date)+(ageStr?' · '+ageStr:'');document.getElementById('mem-delete-btn').style.display=canDelete?'':'none';var prev=document.getElementById('mmn-prev'),next=document.getElementById('mmn-next'),count=document.getElementById('mmn-count');if(prev)prev.disabled=openMemoryIdx<=0;if(next)next.disabled=openMemoryIdx>=openMemoryList.length-1;if(count)count.textContent=(openMemoryIdx+1)+' / '+openMemoryList.length;var media='';if(m.fileData&&m.type==='foto')media='<img src="'+m.fileData+'" alt="" style="width:100%;border-radius:10px;margin-bottom:.85rem;max-height:300px;object-fit:cover">';else if(m.fileData&&m.type==='video')media='<video src="'+m.fileData+'" controls style="width:100%;border-radius:10px;margin-bottom:.85rem;max-height:280px"></video>';else if(m.fileData&&m.type==='audio')media='<audio src="'+m.fileData+'" controls style="width:100%;margin-bottom:.85rem"></audio>';document.getElementById('mem-modal-body').innerHTML=media+'<div style="display:flex;align-items:center;gap:.46rem;margin-bottom:.78rem">'+avHtml(author,26)+'<span style="font-size:.76rem;color:var(--muted)"><strong style="color:var(--text)">'+author.name+'</strong> · '+fmtDate(m.date)+'</span></div>'+(ageStr?'<div style="background:var(--accent-light);color:var(--accent);border-radius:8px;padding:.4rem .7rem;font-size:.76rem;font-weight:700;margin-bottom:.78rem">'+tf('mem_age_line')(db.capsule.childName,ageStr)+'</div>':'')+(m.message?'<div style="background:var(--bg);border-left:3px solid var(--accent);border-radius:8px;padding:.8rem;font-size:.82rem;line-height:1.7;margin-bottom:.85rem">'+m.message+'</div>':'')+renderReactionsHTML(m);}
function confirmDeleteMemory(){var id=openMemoryList[openMemoryIdx]?openMemoryList[openMemoryIdx].id:null;if(!id)return;showConfirm(tc('confirm_delete_mem'),tc('confirm_delete_mem_msg'),tc('confirm_yes'),function(){db.memories=db.memories.filter(function(m){return m.id!==id;});saveDB();closeModal('overlay-memory');openMemoryList=getFilteredMemories();renderMemories();renderStats();showToast(tc('toast_deleted'));});}

// ═══ ADD MEMORY ═══
function selType(btn){document.querySelectorAll('.type-opt').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');selectedType=btn.dataset.type;clearFile();updateUploadZone();}
function updateUploadZone(){var uf=document.getElementById('upload-field');if(!uf)return;if(selectedType==='hito'){uf.style.display='none';return;}uf.style.display='block';var sub=document.getElementById('uz-sub-text');var ft=t('file_types');if(sub&&ft)sub.textContent=ft[selectedType]||'';var fi=document.getElementById('file-input');if(fi){fi.accept=TYPE_CFG[selectedType]&&TYPE_CFG[selectedType].accept?TYPE_CFG[selectedType].accept:'';fi.value='';}}
function onDragOver(e){e.preventDefault();document.getElementById('upload-zone').classList.add('dragover');}
function onDragLeave(){document.getElementById('upload-zone').classList.remove('dragover');}
function onDrop(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('dragover');var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)handleFile(f);}
function onFileChange(e){var f=e.target&&e.target.files&&e.target.files[0];if(f)handleFile(f);}
function handleFile(file){var cfg=TYPE_CFG[selectedType];if(!cfg)return;if(cfg.accept){var prefix=cfg.accept.replace('/*','');if(!file.type.startsWith(prefix)){showToast(tc('toast_fill'));return;}}var reader=new FileReader();reader.onload=function(ev){currentFile={file:file,dataURL:ev.target.result,mimeType:file.type};renderFilePreview(file,ev.target.result);};reader.readAsDataURL(file);}
function renderFilePreview(file,dataURL){var fp=document.getElementById('file-preview');if(!fp)return;fp.style.display='flex';var thumb=document.getElementById('fp-thumb');if(file.type.startsWith('image'))thumb.innerHTML='<img src="'+dataURL+'" alt="">';else if(file.type.startsWith('video'))thumb.innerHTML='<video src="'+dataURL+'" muted></video>';else thumb.innerHTML='<div style="font-size:1.4rem">🎵</div>';document.getElementById('fp-name').textContent=file.name;document.getElementById('fp-size').textContent=fmtBytes(file.size);}
function clearFile(){currentFile=null;var fp=document.getElementById('file-preview');if(fp)fp.style.display='none';var fi=document.getElementById('file-input');if(fi)fi.value='';}
function saveMemory(){var title=document.getElementById('add-title').value.trim();if(!title){showToast(tc('toast_no_title'));return;}var m={id:uid(),type:selectedType,title:title,date:document.getElementById('add-date').value||new Date().toISOString().split('T')[0],message:document.getElementById('add-msg').value.trim(),authorId:currentUser.id,createdAt:new Date().toISOString()};if(currentFile){m.fileData=currentFile.dataURL;m.fileName=currentFile.file.name;m.fileMime=currentFile.mimeType;}db.memories.push(m);saveDB();driveAutoSave();document.getElementById('add-title').value='';document.getElementById('add-msg').value='';document.getElementById('add-date').valueAsDate=new Date();clearFile();showToast(tc('toast_saved'));goTab('memories',document.querySelector('.tab'));}

// ═══ WELCOME LETTER ═══
function renderWelcomeLetterBanner(){var letter=db.welcomeLetter||'';var banner=document.getElementById('welcome-letter-banner');if(!banner)return;if(letter&&letter.trim()){banner.style.display='block';document.getElementById('wl-preview-text').textContent=letter.trim().slice(0,120)+(letter.length>120?'…':'');}else{banner.style.display='none';}}
function openWelcomeLetter(){var letter=db.welcomeLetter||'';document.getElementById('wl-modal-body').innerHTML='<div style="white-space:pre-wrap;font-size:.88rem;line-height:1.85;color:var(--text)">'+letter+'</div>';openModal('overlay-welcome-letter');}
function saveWelcomeLetter(){var txt=document.getElementById('wl-textarea').value;db.welcomeLetter=txt;saveDB();renderWelcomeLetterBanner();showToast(tc('toast_letter_saved'));}

// ═══ PREVIEW ═══
function goPreview(){show('screen-preview');renderPreview();applyI18n();}
function closePreview(){show('screen-app');}
function renderPreview(){var body=document.getElementById('preview-body');if(!body||!db)return;var letter=db.welcomeLetter||'';var mems=db.memories.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});body.innerHTML=(letter?'<div class="preview-letter"><div class="preview-letter-title">✉️ '+tc('wl_title')+'</div><div class="preview-letter-body">'+letter+'</div></div>':'')+'<div style="color:rgba(255,255,255,.5);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem">'+(mems.length?mems.length+' '+tf('memories_word')(mems.length):tc('empty_title'))+'</div><div class="preview-mem-grid">'+(mems.length?mems.map(function(m){var th='';if(m.fileData&&m.type==='foto')th='<img src="'+m.fileData+'">';else{var icons={foto:'📷',video:'🎬',audio:'🎵',hito:'⭐'};th='<div style="font-size:2rem">'+icons[m.type]+'</div>';}return'<div class="preview-mem-card"><div class="preview-mem-thumb">'+th+'</div><div class="preview-mem-title">'+m.title+'</div><div class="preview-mem-date">'+fmtDate(m.date)+'</div></div>';}).join(''):'<div class="preview-empty"><div class="preview-empty-text">'+tc('empty_title')+'</div></div>')+'</div>';}

// ═══ EXPORT / IMPORT ═══
function exportData(){if(!db)return;var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kintu-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);showToast(tc('toast_exported'));}
function importData(e){var file=e.target.files&&e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var data=JSON.parse(ev.target.result);if(!data.capsule||!data.users||!Array.isArray(data.memories))throw new Error('invalid');db=data;if(!db.reactions)db.reactions={};if(!db.welcomeLetter)db.welcomeLetter='';localStorage.setItem(SK,JSON.stringify(db));showToast(tc('toast_imported'));setTimeout(function(){show('screen-login');initLogin();},800);}catch(err){showToast('Error al importar');}};reader.readAsText(file);e.target.value='';}

// ═══ CONFIRM ═══
function showConfirm(title,msg,okLabel,cb){document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-ok-btn').textContent=okLabel;confirmCallback=cb;document.getElementById('confirm-overlay').classList.add('open');}
function confirmOk(){document.getElementById('confirm-overlay').classList.remove('open');if(confirmCallback)confirmCallback();confirmCallback=null;}
function confirmCancel(){document.getElementById('confirm-overlay').classList.remove('open');confirmCallback=null;}

// ═══ SETTINGS ═══
function renderSettings(){if(!db||!currentUser)return;document.getElementById('set-child-name').textContent=db.capsule.childName;document.getElementById('set-open-date').textContent=unlockDate(db.capsule.birth,db.capsule.openAge)+' ('+tf('open_in')(db.capsule.openAge)+')';document.getElementById('set-my-name').textContent=currentUser.name;document.getElementById('set-my-email-desc').textContent=currentUser.email?maskEmail(currentUser.email):'—';var rb=document.getElementById('set-my-role');if(rb){rb.textContent=currentUser.role==='admin'?'Admin':tc('role_member');rb.className='role-badge '+currentUser.role;}var prefs=JSON.parse(localStorage.getItem('kintu_reminder_prefs')||'{"monthly":true,"birthday":true}');var tm=document.getElementById('toggle-monthly'),tb=document.getElementById('toggle-birthday');if(tm)tm.checked=prefs.monthly!==false;if(tb)tb.checked=prefs.birthday!==false;var wlta=document.getElementById('wl-textarea');if(wlta)wlta.value=db.welcomeLetter||'';renderLangSelect();updateDriveUI();applyI18n();}
function openEditCapsuleModal(){document.getElementById('ec-name').value=db.capsule.childName;document.getElementById('ec-birth').value=db.capsule.birth;document.getElementById('ec-age').value=db.capsule.openAge;openModal('overlay-edit-capsule');}
function saveCapsuleEdit(){var name=document.getElementById('ec-name').value.trim(),birth=document.getElementById('ec-birth').value;if(!name||!birth){showToast(tc('toast_fill'));return;}db.capsule.childName=name;db.capsule.birth=birth;db.capsule.openAge=parseInt(document.getElementById('ec-age').value);saveDB();closeModal('overlay-edit-capsule');renderSettings();renderCountdown();showToast(tc('toast_capsule_updated'));}
function openChangePinModal(){['cp0','cp1','cp2','cp3'].forEach(function(id){document.getElementById(id).value='';});openModal('overlay-change-pin');}
function saveChangedPin(){var pin=getPin(['cp0','cp1','cp2','cp3']);if(pin.length<4){showToast(tc('toast_short_pin'));return;}var u=db.users.find(function(x){return x.id===currentUser.id;});if(!u)return;u.pin=pin;currentUser.pin=pin;saveDB();closeModal('overlay-change-pin');showToast(tc('toast_pin_updated'));}
function openEditProfileModal(){document.getElementById('ep-name').value=currentUser.name;document.getElementById('ep-email').value=currentUser.email||'';buildColorPicker('ep-color-picker',currentUser.color);openModal('overlay-edit-profile');}
function saveEditProfile(){var name=document.getElementById('ep-name').value.trim();if(!name){showToast(tc('toast_fill'));return;}var email=document.getElementById('ep-email').value.trim().toLowerCase();if(email&&!email.includes('@')){showToast(tc('toast_invalid_email'));return;}var color=getPickerColor('ep-color-picker');var u=db.users.find(function(x){return x.id===currentUser.id;});if(!u)return;u.name=name;u.email=email;u.color=color;currentUser.name=name;currentUser.email=email;currentUser.color=color;saveDB();var av=document.getElementById('tb-avatar');if(av){av.style.background=color;av.textContent=ini(name);}var tn=document.getElementById('tb-name');if(tn)tn.textContent=name;closeModal('overlay-edit-profile');renderSettings();if(currentUser.role==='admin')renderUsersAdmin();showToast(tc('toast_profile_updated'));}

// ═══ USERS ═══
function renderUsersAdmin(){if(!db)return;document.getElementById('users-admin-list').innerHTML=db.users.map(function(u){var count=db.memories.filter(function(m){return m.authorId===u.id;}).length;var isSelf=u.id===currentUser.id;return'<div class="user-admin-item"><div class="uai-left">'+avHtml(u,40)+'<div><div class="uai-name">'+u.name+(isSelf?' <span style="font-size:.63rem;color:var(--muted)">('+tc('you')+')</span>':'')+'</div><div class="uai-meta"><span class="role-badge '+u.role+'">'+(u.role==='admin'?'Admin':tc('role_member'))+'</span>· '+count+' '+tf('memories_word')(count)+(u.email?' · '+maskEmail(u.email):'')+'</div></div></div><div class="uai-actions"><button class="btn btn-secondary btn-sm" onclick="openUserDetail(\''+u.id+'\')">'+tc('btn_edit')+'</button></div></div>';}).join('');}
function openNewUserModal(){buildColorPicker('nu-color-picker',COLORS[1]);['nu-p0','nu-p1','nu-p2','nu-p3'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('nu-name').value='';document.getElementById('nu-email').value='';document.getElementById('nu-role').value='member';document.getElementById('nu-access-preview').style.display='none';applyI18n();openModal('overlay-new-user');}
function previewAccess(){var name=document.getElementById('nu-name').value.trim();var pin=getPin(['nu-p0','nu-p1','nu-p2','nu-p3']);if(!name){showToast(tc('toast_fill'));return;}if(pin.length<4){showToast(tc('toast_short_pin'));return;}document.getElementById('nu-invite-msg').textContent=tf('invite')(name,pin,document.getElementById('nu-role').value,db.capsule.childName,db.capsule.openAge);document.getElementById('nu-access-preview').style.display='block';}
function saveNewUser(){var name=document.getElementById('nu-name').value.trim();var email=document.getElementById('nu-email').value.trim().toLowerCase();var pin=getPin(['nu-p0','nu-p1','nu-p2','nu-p3']);if(!name){showToast(tc('toast_fill'));return;}if(pin.length<4){showToast(tc('toast_short_pin'));return;}if(email&&!email.includes('@')){showToast(tc('toast_invalid_email'));return;}db.users.push({id:uid(),name:name,email:email,role:document.getElementById('nu-role').value,color:getPickerColor('nu-color-picker'),pin:pin,createdAt:new Date().toISOString()});saveDB();closeModal('overlay-new-user');renderUsersAdmin();showToast(tf('toast_user_added')(name));}
function openUserDetail(userId){editingUserId=userId;var u=db.users.find(function(x){return x.id===userId;});if(!u)return;var isSelf=userId===currentUser.id;var count=db.memories.filter(function(m){return m.authorId===userId;}).length;document.getElementById('ud-title').textContent=u.name;document.getElementById('ud-sub').textContent=(u.role==='admin'?tc('role_admin'):tc('role_member'))+' · '+count+' '+tf('memories_word')(count);document.getElementById('ud-delete-btn').style.display=isSelf?'none':'';document.getElementById('ud-save-btn').style.display=isSelf?'none':'';document.getElementById('ud-body').innerHTML='<div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1.1rem;padding-bottom:.95rem;border-bottom:1px solid var(--border)">'+avHtml(u,44)+'<div><div style="font-size:.93rem;font-weight:800">'+u.name+'</div><div style="font-size:.68rem;color:var(--muted);margin-top:.12rem">'+(u.email?maskEmail(u.email):'—')+'</div></div></div>'+(!isSelf?'<div class="form-field"><label>'+tc('set_name')+'</label><input type="text" id="ud-name" value="'+u.name+'"></div><div class="form-field"><label>'+tc('field_email')+'</label><input type="email" id="ud-email" value="'+(u.email||'')+'"></div><div class="form-field"><label>'+tc('nu_role')+'</label><select id="ud-role"><option value="member"'+(u.role==='member'?' selected':'')+'>'+tc('role_member')+'</option><option value="admin"'+(u.role==='admin'?' selected':'')+'>Admin</option></select></div><div class="form-field"><label>'+tc('field_color')+'</label><div class="color-picker" id="ud-color-picker"></div></div><div class="form-field"><label>'+tc('nu_pin')+'</label><div class="pin-row" style="justify-content:flex-start"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p0" oninput="pinMove(this,null,\'ud-p1\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p1" oninput="pinMove(this,\'ud-p0\',\'ud-p2\')" onkeydown="pinBack(event,\'ud-p0\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p2" oninput="pinMove(this,\'ud-p1\',\'ud-p3\')" onkeydown="pinBack(event,\'ud-p1\')"><input class="pin-box" type="password" maxlength="1" inputmode="numeric" id="ud-p3" oninput="pinMove(this,\'ud-p2\',null)" onkeydown="pinBack(event,\'ud-p2\')"></div></div>':'')+'<div class="access-box"><div class="ab-label">'+tc('nu_preview')+'</div><div class="access-code">'+u.pin+'</div><div style="font-size:.7rem;color:var(--muted);margin-bottom:.48rem">'+tc('set_email_rec')+': <strong>'+(u.email||'—')+'</strong></div><button class="copy-btn" onclick="copyInvite(\''+u.id+'\')">📋 '+tc('nu_preview_btn')+'</button></div>';if(!isSelf)buildColorPicker('ud-color-picker',u.color);openModal('overlay-user-detail');}
function saveUserEdit(){var u=db.users.find(function(x){return x.id===editingUserId;});if(!u)return;var name=document.getElementById('ud-name').value.trim();if(!name){showToast(tc('toast_fill'));return;}u.name=name;u.email=document.getElementById('ud-email').value.trim().toLowerCase();u.role=document.getElementById('ud-role').value;u.color=getPickerColor('ud-color-picker');var np=getPin(['ud-p0','ud-p1','ud-p2','ud-p3']);if(np.length===4)u.pin=np;saveDB();closeModal('overlay-user-detail');renderUsersAdmin();showToast(tc('toast_changes'));}
function confirmDeleteUser(){var u=db.users.find(function(x){return x.id===editingUserId;});if(!u)return;showConfirm(tc('confirm_delete_user'),tc('confirm_delete_user_msg'),tc('confirm_yes'),function(){db.users=db.users.filter(function(x){return x.id!==editingUserId;});saveDB();closeModal('overlay-user-detail');renderUsersAdmin();showToast(tf('toast_user_deleted')(u.name));});}
function copyInvite(userId){var u=db.users.find(function(x){return x.id===userId;});if(!u)return;navigator.clipboard.writeText(tf('invite')(u.name,u.pin,u.role,db.capsule.childName,db.capsule.openAge)).then(function(){showToast(tc('toast_copied'));}).catch(function(){showToast(tc('toast_copied'));});}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){var el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2600);}
</script>
